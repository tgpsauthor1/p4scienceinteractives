<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Circulatory System Guess-the-Word Game</title>
<style>
:root{
  --bg1:#f7fbff;--bg2:#eef5ff;--panel:#ffffff;--ink:#17314d;--muted:#5b738f;--line:#d8e4f6;
  --accent:#2a69f0;--accent-dark:#114bb5;--good:#137a44;--warn:#9c6100;--bad:#a22323;
  --red1:#ff95a7;--red2:#ef5e76;--blue1:#8fd2ff;--blue2:#48ade8;--shadow:0 14px 34px rgba(23,49,77,.09);--radius:20px;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 100%)}
.app-shell{min-height:100vh;padding:20px 14px 28px;display:flex;justify-content:center}
.app{width:min(1160px,100%);display:grid;gap:16px}
.card{background:var(--panel);border:2px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.hero{padding:28px;text-align:center}
.hero h1{margin:0 0 10px;font-size:clamp(2rem,4vw,3rem);line-height:1.1}
.hero p{margin:0 auto 20px;max-width:780px;font-size:1.12rem;line-height:1.55;color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:10px;border-radius:999px;padding:10px 16px;background:#eef5ff;border:2px solid #cfe0ff;color:var(--accent-dark);font-weight:800;margin-bottom:18px}
.button{appearance:none;border:0;border-radius:14px;cursor:pointer;min-height:54px;padding:14px 18px;font-size:1rem;font-weight:800;transition:transform .12s ease,background .12s ease,opacity .12s ease}
.button:hover{transform:translateY(-1px)} .button:active{transform:translateY(0)}
.button[disabled]{opacity:.55;cursor:not-allowed;transform:none}
.button.primary{background:var(--accent);color:white}.button.primary:hover{background:var(--accent-dark)}
.button.secondary{background:#eff5ff;color:var(--accent-dark);border:2px solid #d0e0ff}
.button.ghost{background:#f8fbff;color:var(--ink);border:2px solid #d7e4f6}
.main-layout{display:grid;grid-template-columns:minmax(0,1fr) 350px;gap:16px;align-items:start}
.screen-card{padding:22px}.side-card{padding:18px;position:sticky;top:16px}
.top-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:space-between;align-items:center;margin-bottom:16px}
.label-pill{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 14px;background:#eef5ff;border:2px solid #d2e0ff;color:var(--accent-dark);font-weight:800}
.progress{font-size:.98rem;color:var(--muted);font-weight:800}
.prompt{font-size:clamp(1.2rem,2vw,1.55rem);font-weight:900;margin:0 0 18px}
.sentence-panel{border:2px solid #d8e4f6;border-radius:18px;background:#fbfdff;padding:18px;font-size:clamp(1.22rem,2.1vw,1.56rem);line-height:1.82;white-space:pre-wrap;word-break:break-word}
.plain-token{white-space:pre-wrap}.guess-wrap{display:inline-flex;vertical-align:middle;margin:0 4px}
.guess-chip{display:inline-flex;flex-direction:column;align-items:center;gap:8px;min-width:150px;padding:10px 10px 12px;border-radius:16px;border:2px solid #bfd1ff;background:#f3f7ff}
.guess-chip.future{background:#f8fbff;border-color:#d6e1f4}.guess-chip.solved{background:#eefaf2;border-color:#bfe5ca}
.guess-chip.fail{background:#fff2f2;border-color:#f0c5c5;animation:pulse .9s infinite}
.clue{font-size:1.06rem;font-weight:900;letter-spacing:.16em;color:var(--accent-dark);text-transform:lowercase;min-height:1.2em}
.solved-word,.flash-word{padding:4px 10px;border-radius:10px;font-size:1.15rem;font-weight:900}
.solved-word{color:var(--good);background:#e8f8ee}.flash-word{color:var(--bad);background:#ffe2e2}
.guess-input{width:180px;min-width:120px;padding:12px 14px;border-radius:12px;border:2px solid #97b8f5;font-size:1rem;font-weight:800;text-align:center;color:var(--ink);background:#fff}
.guess-input:focus{outline:3px solid rgba(42,105,240,.18);border-color:var(--accent)}

details.visual-details{margin-top:16px;border:2px solid #d8e4f6;border-radius:16px;overflow:hidden;background:#fbfdff}
details.visual-details summary{cursor:pointer;padding:14px 16px;font-weight:900;user-select:none;list-style:none;color:var(--accent-dark);background:#f5f9ff}
details.visual-details summary::-webkit-details-marker{display:none}
.visual-details-body{border-top:2px solid #e5edf9;padding:14px}
.visual-panel{background:linear-gradient(180deg,#fbfeff 0%,#f3f9ff 100%)}
.visual-title{margin:0 0 10px;font-size:1.02rem;font-weight:900;color:var(--accent-dark)}
.visual-sub{margin:0 0 12px;font-size:.95rem;color:var(--muted);line-height:1.45}
.diagram-wrap{min-height:190px;display:grid;place-items:center}
.flow-scene,.parts-scene{width:100%;display:flex;justify-content:center;align-items:center;gap:18px;flex-wrap:wrap}
.body-card{width:154px;min-height:164px;border-radius:24px;background:linear-gradient(180deg,#fff6ec 0%,#ffe2c5 100%);border:3px solid #f0cf9f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px}
.person-head{width:64px;height:64px;border-radius:999px;display:grid;place-items:center;font-size:1.7rem;border:3px solid #efc18a;background:radial-gradient(circle at 32% 25%,#ffe6b8 0%,#ffd397 60%,#efbd78 100%)}
.torso{width:98px;height:92px;border-radius:24px;background:linear-gradient(180deg,#92d6ff 0%,#5cb8f2 100%);position:relative;display:flex;justify-content:center;align-items:center}
.heart-core,.big-heart,.drum-heart{background:linear-gradient(180deg,var(--red1) 0%,var(--red2) 100%)}
.heart-core{width:54px;height:52px;clip-path:path("M27 50 C10 38,0 28,0 15 C0 6,7 0,15 0 C21 0,25 4,27 8 C29 4,33 0,39 0 C47 0,54 6,54 15 C54 28,44 38,27 50 Z");animation:heartbeat 1.4s ease-in-out infinite;filter:drop-shadow(0 6px 10px rgba(190,55,80,.22))}
.vessel-line{position:absolute;width:82px;height:8px;border-radius:999px;background:linear-gradient(90deg,#ffadb9 0%,#ff6f84 100%);top:42px;left:8px;opacity:.68}
.vessel-line.two{transform:rotate(90deg)}
.flow-column{display:flex;flex-direction:column;gap:10px;align-items:center;min-width:108px}
.flow-pill{padding:10px 12px;border-radius:14px;font-weight:900;color:white;font-size:.97rem;animation:pulseMove 1.8s ease-in-out infinite;text-align:center}
.flow-pill.food{background:linear-gradient(180deg,#ffb55e 0%,#ef8c24 100%)} .flow-pill.oxygen{background:linear-gradient(180deg,#67c7ff 0%,#1d90dd 100%);animation-delay:.4s}
.flow-pill.waste{background:linear-gradient(180deg,#b298ff 0%,#7a58dd 100%)} .flow-pill.removal{background:linear-gradient(180deg,#ff9da9 0%,#ed6277 100%);animation-delay:.4s}

.diagram-card{width:180px;height:198px;border-radius:24px;background:linear-gradient(180deg,#f7fcff 0%,#eef8ff 100%);border:3px solid #d8eafb;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px}
.big-heart{width:60px;height:58px;clip-path:path("M30 56 C11 42,0 31,0 17 C0 7,8 0,17 0 C24 0,28 4,30 9 C32 4,36 0,43 0 C52 0,60 7,60 17 C60 31,49 42,30 56 Z");animation:heartbeat 1.5s ease-in-out infinite}
.blood-loop{width:126px;height:88px;border:8px solid #ffb4bf;border-radius:999px;position:absolute;bottom:18px;opacity:.64;animation:pulseGlow 2s ease-in-out infinite}
.blood-loop::before,.blood-loop::after{content:"";position:absolute;width:16px;height:16px;border-radius:999px;background:#ff6f84;top:32px;animation:moveDot 2.2s linear infinite}
.blood-loop::after{background:#5cb8f2;animation-delay:1.1s}
.parts-list{display:flex;flex-direction:column;gap:10px;min-width:170px}
.part-label{padding:12px 14px;border-radius:14px;border:2px solid #d7e4f6;background:white;font-weight:900;color:var(--ink);display:flex;align-items:center;gap:10px}
.part-badge{width:34px;height:34px;border-radius:999px;display:grid;place-items:center;background:#eef6ff;border:2px solid #d3e3ff;color:var(--accent-dark);font-size:.95rem;font-weight:900}

.controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:16px}
.feedback{margin-top:14px;min-height:58px;border-radius:14px;padding:14px 16px;font-size:1rem;font-weight:800;line-height:1.5;border:2px solid #dce6f7;background:#f7fbff}
.feedback.good{background:#eefaf2;border-color:#bfe5ca;color:var(--good)}
.feedback.warn{background:#fff8ee;border-color:#f1d6ad;color:var(--warn)}
.feedback.bad{background:#fff2f2;border-color:#f0c5c5;color:var(--bad)}
.side-card h2{margin:0 0 12px;font-size:1.18rem}
.mini{margin:0 0 12px;color:var(--muted);font-size:.97rem;line-height:1.45}
.tracker-frame{border:2px solid #d8e4f6;border-radius:18px;padding:16px;background:linear-gradient(180deg,#fbfffd 0%,#f4fbff 100%)}
.tracker-top{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:10px}
.face-bubble{width:84px;height:84px;border-radius:999px;display:grid;place-items:center;font-size:2.15rem;border:3px solid #d7e3f6;box-shadow:0 8px 18px rgba(23,50,77,.08);background:linear-gradient(180deg,#f7fff9 0%,#edfff2 100%)}
.face-bubble.worried{background:linear-gradient(180deg,#fff9ef 0%,#fff0d8 100%)} .face-bubble.angry{background:linear-gradient(180deg,#fff3f3 0%,#ffe0e0 100%)} .face-bubble.fail{background:linear-gradient(180deg,#f7f1ff 0%,#ece2ff 100%)}
.face-caption{min-height:1.3em;font-size:.97rem;font-weight:800;color:var(--muted);text-align:center}
.tracker-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px}
.tracker-chip{min-width:34px;min-height:34px;padding:4px 8px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-size:1.2rem;border:2px solid #d5e2f6;background:#fff}
.tracker-chip.lost{opacity:.34;filter:grayscale(1)}
.tracker-stats{display:flex;justify-content:space-between;gap:12px;margin-top:8px;font-size:.95rem;font-weight:800;color:var(--muted)}
.scene{min-height:188px;display:grid;place-items:center;padding:8px 6px}
.drum-scene{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
.drum-heart{width:76px;height:74px;clip-path:path("M38 72 C14 54,0 40,0 22 C0 9,10 0,21 0 C29 0,35 5,38 11 C41 5,47 0,55 0 C66 0,76 9,76 22 C76 40,62 54,38 72 Z");animation:heartbeatFast 1.1s ease-in-out infinite}
.drum-box{width:132px;height:92px;border-radius:20px;background:linear-gradient(180deg,#ffd389 0%,#f0ae48 100%);border:4px solid #d28e2c;display:grid;place-items:center;position:relative;overflow:hidden}
.drum-box::before,.drum-box::after{content:"";position:absolute;width:86px;height:10px;background:#a86b1f;border-radius:999px;top:16px;left:22px;opacity:.38}
.drumstick-row{display:flex;gap:12px;align-items:center;justify-content:center}
.stick{width:56px;height:10px;border-radius:999px;background:linear-gradient(90deg,#d09a58 0%,#a56d2b 100%);position:relative;animation:tapMove .5s ease-in-out infinite}
.stick::after{content:"";position:absolute;right:-6px;top:-5px;width:20px;height:20px;border-radius:999px;background:#f1d1a4;border:2px solid #d8b381}
.stick.two{animation-delay:.25s}
.fail-box{min-height:188px;display:grid;place-items:center;text-align:center;color:var(--bad);font-weight:900;line-height:1.45;background:#fff4f4;border:2px dashed #efc1c1;border-radius:16px;padding:12px}

details.help{margin-top:18px;border:2px solid #d8e4f6;border-radius:16px;overflow:hidden;background:#fbfdff}
details.help summary{cursor:pointer;padding:14px 16px;font-weight:800;user-select:none;list-style:none}
details.help summary::-webkit-details-marker{display:none}
.help-body{padding:0 16px 16px;border-top:2px solid #e5edf9;color:var(--muted);line-height:1.6;font-size:.98rem}
.help-body p{margin:12px 0 0}
.complete-list{margin:18px auto 0;max-width:760px;text-align:left;border:2px solid #d8e4f6;border-radius:18px;background:#fbfdff;padding:16px 18px}
.complete-list h2{margin:0 0 10px;font-size:1.15rem}
.complete-list ul{margin:0;padding-left:20px;line-height:1.7}

@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes pulseMove{0%{transform:translateX(0)}50%{transform:translateX(4px)}100%{transform:translateX(0)}}
@keyframes heartbeat{0%{transform:scale(.95)}20%{transform:scale(1.06)}40%{transform:scale(.98)}100%{transform:scale(.95)}}
@keyframes heartbeatFast{0%{transform:scale(.94)}18%{transform:scale(1.1)}36%{transform:scale(.97)}100%{transform:scale(.94)}}
@keyframes tapMove{0%{transform:translateY(0) rotate(-14deg)}50%{transform:translateY(7px) rotate(-4deg)}100%{transform:translateY(0) rotate(-14deg)}}
@keyframes pulseGlow{0%{opacity:.55}50%{opacity:.82}100%{opacity:.55}}
@keyframes moveDot{0%{left:6px}50%{left:98px}100%{left:6px}}

@media (max-width:920px){.main-layout{grid-template-columns:1fr}.side-card{position:static}}
@media (max-width:640px){
  .app-shell{padding:14px 10px 22px}
  .hero,.screen-card,.side-card{padding:18px}
  .sentence-panel{font-size:1.13rem;line-height:1.74}
  .guess-chip{min-width:130px}
  .guess-input{width:min(160px,52vw)}
  .controls{align-items:stretch}
  .button{width:100%}
}
</style>
</head>
<body>
<div class="app-shell">
  <div id="app" class="app" aria-live="polite"></div>
</div>
<script>
const GAME_TITLE = "Circulatory System Guess-the-Word Game";
const SOURCE_SCREENS = [{"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The circulatory system carries digested food and oxygen to different parts of the body.", "targets": ["circulatory"], "demeritText": "The heart beats a drum faster.", "failText": "The heart throws the drumstick at you.", "visualType": "circulation_flow"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The circulatory system carries digested food and oxygen to different parts of the body.", "targets": ["digested", "food"], "demeritText": "The heart beats a drum faster.", "failText": "The heart throws the drumstick at you.", "visualType": "circulation_flow"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The circulatory system carries digested food and oxygen to different parts of the body.", "targets": ["oxygen"], "demeritText": "The heart beats a drum faster.", "failText": "The heart throws the drumstick at you.", "visualType": "circulation_flow"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The circulatory system carries digested food and oxygen to different parts of the body.", "targets": ["carries"], "demeritText": "The heart beats a drum faster.", "failText": "The heart throws the drumstick at you.", "visualType": "circulation_flow"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The circulatory system carries digested food and oxygen to different parts of the body.", "targets": ["parts", "body"], "demeritText": "The heart beats a drum faster.", "failText": "The heart throws the drumstick at you.", "visualType": "circulation_flow"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The circulatory system carries waste materials away from different parts of the body for removal.", "targets": ["circulatory"], "demeritText": "The heart beats a drum faster.", "failText": "The heart throws the drumstick at you.", "visualType": "waste_flow"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The circulatory system carries waste materials away from different parts of the body for removal.", "targets": ["waste", "materials"], "demeritText": "The heart beats a drum faster.", "failText": "The heart throws the drumstick at you.", "visualType": "waste_flow"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The circulatory system carries waste materials away from different parts of the body for removal.", "targets": ["carries", "away"], "demeritText": "The heart beats a drum faster.", "failText": "The heart throws the drumstick at you.", "visualType": "waste_flow"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The circulatory system carries waste materials away from different parts of the body for removal.", "targets": ["parts", "body"], "demeritText": "The heart beats a drum faster.", "failText": "The heart throws the drumstick at you.", "visualType": "waste_flow"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The circulatory system carries waste materials away from different parts of the body for removal.", "targets": ["removal"], "demeritText": "The heart beats a drum faster.", "failText": "The heart throws the drumstick at you.", "visualType": "waste_flow"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Parts of the circulatory system includes the heart and the blood vessels carrying blood.", "targets": ["circulatory"], "demeritText": "The heart beats a drum faster.", "failText": "The heart throws the drumstick at you.", "visualType": "parts_diagram"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Parts of the circulatory system includes the heart and the blood vessels carrying blood.", "targets": ["heart"], "demeritText": "The heart beats a drum faster.", "failText": "The heart throws the drumstick at you.", "visualType": "parts_diagram"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Parts of the circulatory system includes the heart and the blood vessels carrying blood.", "targets": ["blood", "vessels"], "demeritText": "The heart beats a drum faster.", "failText": "The heart throws the drumstick at you.", "visualType": "parts_diagram"}];
const FLASH_DURATION_MS = 10000;

const state = {view:"intro", screenIndex:0, screens:[], currentInput:"", feedback:"", feedbackTone:"warn"};

function normalizeWord(text){ return (text || "").toLowerCase().replace(/[^a-z0-9]/gi,""); }
function tokenize(sentence){ return sentence.match(/(\s+|[A-Za-z']+|[^A-Za-z'\s]+)/g) || []; }
function shuffleArray(items){
  const arr = [...items];
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}
function prepareScreens(rawScreens){
  return rawScreens.map((screen, idx) => {
    const tokens = tokenize(screen.sentence);
    const targetSet = new Set(screen.targets.map(t => normalizeWord(t)));
    const occurrences = [];
    tokens.forEach((token, tokenIndex) => {
      const normalized = normalizeWord(token);
      if(normalized && targetSet.has(normalized)){
        occurrences.push({tokenIndex, originalToken:token, target:token, solved:false, fail:false, wrongAttempts:0, revealedCount:1, chanceLimit:Math.max(normalized.length-2,1)});
      }
    });
    return {...screen, tokens, occurrences, orderLabel: idx+1};
  });
}
function activeOccurrenceIndex(screen){ return screen.occurrences.findIndex(o => !o.solved); }
function getActiveOccurrence(screen){
  const index = activeOccurrenceIndex(screen);
  if(index === -1) return null;
  return {index, occurrence: screen.occurrences[index]};
}
function clueText(target, revealedCount){
  const clean = target.replace(/[^A-Za-z0-9]/g,"");
  const shown = clean.slice(0, Math.max(1, revealedCount));
  const hidden = clean.slice(Math.max(1, revealedCount)).split("").map(() => "_").join(" ");
  return hidden ? `${shown} ${hidden}` : shown;
}
function escapeHtml(text){
  return String(text).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function escapeAttribute(text){ return escapeHtml(text).replace(/`/g,"&#96;"); }
function clearSpeech(){ if("speechSynthesis" in window) window.speechSynthesis.cancel(); }
function speakText(text){
  if(!("speechSynthesis" in window)) return;
  clearSpeech();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.96; utterance.pitch = 1;
  window.speechSynthesis.speak(utterance);
}
function currentScreen(){ return state.screens[state.screenIndex]; }
function screenSolved(screen){ return screen.occurrences.every(o => o.solved); }
function sentenceForReadAloud(screen){
  return screen.tokens.map((token, tokenIndex) => {
    const occIndex = screen.occurrences.findIndex(o => o.tokenIndex === tokenIndex);
    if(occIndex === -1) return token;
    const occ = screen.occurrences[occIndex];
    if(occ.solved || occ.fail) return occ.originalToken;
    return "blank";
  }).join("");
}
function updateFeedback(text, tone){ state.feedback = text; state.feedbackTone = tone; }
function startGame(){
  state.screens = prepareScreens(shuffleArray(SOURCE_SCREENS));
  state.view = "play";
  state.screenIndex = 0;
  state.currentInput = "";
  updateFeedback("Type the full missing word and tap Check.","warn");
  render();
  focusActiveInput();
}
function restartAll(){ clearSpeech(); startGame(); }
function backToStart(){
  clearSpeech();
  state.view = "intro";
  state.screenIndex = 0;
  state.screens = [];
  state.currentInput = "";
  state.feedback = "";
  state.feedbackTone = "warn";
  render();
}
function focusActiveInput(){
  requestAnimationFrame(() => {
    const input = document.getElementById("activeGuessInput");
    if(input && !input.disabled){ input.focus(); input.select(); }
  });
}
function moveNext(){
  if(state.screenIndex < state.screens.length - 1){
    state.screenIndex += 1;
    state.currentInput = "";
    updateFeedback("Type the full missing word and tap Check.","warn");
    render();
    focusActiveInput();
  } else {
    state.view = "complete";
    render();
  }
}
function handleInputChange(value){ state.currentInput = value.replace(/\s+/g,""); }
function resetFailedOccurrence(screen, occ){
  occ.fail = false; occ.wrongAttempts = 0; occ.revealedCount = 1; state.currentInput = "";
  updateFeedback("That word has reset. Try again from the first clue.","warn");
  render(); focusActiveInput();
}
function checkGuess(){
  const screen = currentScreen();
  if(!screen) return;
  const active = getActiveOccurrence(screen);
  if(!active) return;
  const occ = active.occurrence;
  if(occ.fail) return;
  const guess = state.currentInput.trim();
  if(!guess){
    updateFeedback("Type the full word first.","warn");
    render(); focusActiveInput(); return;
  }
  if(normalizeWord(guess) === normalizeWord(occ.target)){
    occ.solved = true; occ.fail = false; state.currentInput = "";
    updateFeedback(screenSolved(screen) ? "Correct. This sentence is complete." : "Correct. Now solve the next missing word.","good");
    render(); focusActiveInput(); return;
  }
  occ.wrongAttempts += 1;
  occ.revealedCount = Math.min(normalizeWord(occ.target).length, occ.revealedCount + 1);
  if(occ.wrongAttempts >= occ.chanceLimit){
    occ.fail = true;
    updateFeedback(screen.failText,"bad");
    render();
    window.setTimeout(() => { resetFailedOccurrence(screen, occ); }, FLASH_DURATION_MS);
    return;
  }
  updateFeedback(screen.demeritText + " One more letter is now shown.","warn");
  render(); focusActiveInput();
}
function buildSentenceMarkup(screen){
  const active = getActiveOccurrence(screen);
  const activeIndex = active ? active.index : -1;
  return screen.tokens.map((token, tokenIndex) => {
    const occIndex = screen.occurrences.findIndex(o => o.tokenIndex === tokenIndex);
    if(occIndex === -1) return `<span class="plain-token">${escapeHtml(token)}</span>`;
    const occ = screen.occurrences[occIndex];
    if(occ.solved) return `<span class="guess-wrap"><span class="guess-chip solved"><span class="solved-word">${escapeHtml(occ.originalToken)}</span></span></span>`;
    if(occ.fail) return `<span class="guess-wrap"><span class="guess-chip fail"><span class="flash-word">${escapeHtml(occ.originalToken)}</span></span></span>`;
    if(occIndex === activeIndex){
      const width = Math.max(120, normalizeWord(occ.target).length * 18 + 80);
      return `
        <span class="guess-wrap">
          <label class="guess-chip" aria-label="Missing word input">
            <span class="clue">${escapeHtml(clueText(occ.target, occ.revealedCount))}</span>
            <input id="activeGuessInput" class="guess-input" type="text" autocomplete="off" autocapitalize="none"
              spellcheck="false" inputmode="text" maxlength="${normalizeWord(occ.target).length + 2}" placeholder="Type full word"
              style="width:${width}px" value="${escapeAttribute(state.currentInput)}" />
          </label>
        </span>`;
    }
    return `<span class="guess-wrap"><span class="guess-chip future"><span class="clue">${escapeHtml(clueText(occ.target, 1))}</span></span></span>`;
  }).join("");
}
function faceState(used, total, fail){
  if(fail) return {cls:"fail", emoji:"😡", caption:"The heart threw the drumstick."};
  if(used === 0) return {cls:"", emoji:"🙂", caption:"The heart is still beating calmly."};
  const ratio = used / total;
  if(ratio < 0.5) return {cls:"worried", emoji:"😟", caption:"The drumming is getting faster."};
  return {cls:"angry", emoji:"😤", caption:"The heart is drumming very fast now."};
}
function renderPenaltyTracker(screen){
  const active = getActiveOccurrence(screen);
  if(!active){
    return `<div class="tracker-frame"><div class="scene"><div class="tracker-top"><div class="face-bubble">😄</div><div class="face-caption">This screen is complete.</div></div></div></div>`;
  }
  const occ = active.occurrence;
  const used = occ.wrongAttempts, total = occ.chanceLimit, left = Math.max(total-used,0), face = faceState(used, total, occ.fail);
  if(occ.fail){
    return `<div class="tracker-frame"><div class="fail-box"><div class="tracker-top"><div class="face-bubble fail">😡</div><div class="face-caption">${escapeHtml(face.caption)}</div></div><div class="drum-heart"></div><div class="drumstick-row"><div class="stick" style="transform:translateX(18px) rotate(18deg);"></div></div><div class="drum-box">🥁</div><div style="margin-top:8px;">${escapeHtml(screen.failText)}</div></div></div>`;
  }
  const beats = Array.from({length: total}, (_, i) => `<span class="tracker-chip ${i < used ? "lost" : ""}">${i < used ? "🥁" : "💓"}</span>`).join("");
  const speed = 1.2 - Math.min(used * 0.08, 0.45);
  return `<div class="tracker-frame"><div class="tracker-row">${beats}</div><div class="scene"><div class="drum-scene"><div class="tracker-top"><div class="face-bubble ${face.cls}">${face.emoji}</div><div class="face-caption">${face.caption}</div></div><div class="drum-heart" style="animation-duration:${speed}s;"></div><div class="drumstick-row"><div class="stick" style="animation-duration:${speed/2}s;"></div><div class="stick two" style="animation-duration:${speed/2}s;"></div></div><div class="drum-box">🥁</div></div></div><div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Calm beats left: ${left}</span></div></div>`;
}
function renderCarryFlowVisual(){
  return `<div class="visual-panel"><p class="visual-title">Visual clue</p><p class="visual-sub">The circulatory system carries useful things like digested food and oxygen around the body.</p><div class="diagram-wrap"><div class="flow-scene"><div class="flow-column"><div class="flow-pill food">digested food →</div><div class="flow-pill oxygen">oxygen →</div></div><div class="body-card" aria-hidden="true"><div class="person-head">🙂</div><div class="torso"><div class="vessel-line"></div><div class="vessel-line two"></div><div class="heart-core"></div></div></div><div class="flow-column"><div class="flow-pill food">→ body parts</div><div class="flow-pill oxygen">→ body parts</div></div></div></div></div>`;
}
function renderWasteFlowVisual(){
  return `<div class="visual-panel"><p class="visual-title">Visual clue</p><p class="visual-sub">The circulatory system also carries waste materials away from body parts for removal.</p><div class="diagram-wrap"><div class="flow-scene"><div class="flow-column"><div class="flow-pill waste">waste materials</div><div class="flow-pill removal">away for removal</div></div><div class="body-card" aria-hidden="true"><div class="person-head">🙂</div><div class="torso"><div class="vessel-line"></div><div class="vessel-line two"></div><div class="heart-core"></div></div></div><div class="flow-column"><div class="flow-pill waste">from body parts</div><div class="flow-pill removal">→ out</div></div></div></div></div>`;
}
function renderPartsVisual(){
  return `<div class="visual-panel"><p class="visual-title">Visual clue</p><p class="visual-sub">The circulatory system has the heart and blood vessels carrying blood.</p><div class="diagram-wrap"><div class="parts-scene"><div class="diagram-card" aria-hidden="true"><div class="big-heart"></div><div class="blood-loop"></div></div><div class="parts-list"><div class="part-label"><span class="part-badge">1</span> Heart</div><div class="part-label"><span class="part-badge">2</span> Blood vessels</div><div class="part-label"><span class="part-badge">3</span> Blood</div></div></div></div></div>`;
}
function visualMarkup(screen){
  let visualContent = "";
  if(screen.visualType === "circulation_flow") visualContent = renderCarryFlowVisual();
  else if(screen.visualType === "waste_flow") visualContent = renderWasteFlowVisual();
  else visualContent = renderPartsVisual();
  return `<details class="visual-details"><summary>Show visual clue</summary><div class="visual-details-body">${visualContent}</div></details>`;
}
function renderIntro(){
  return `<section class="card hero"><div class="badge">❤️ Guess the missing science word</div><h1>${escapeHtml(GAME_TITLE)}</h1><p>Each time you start, the screens appear in a random order. Type the full missing word inside the sentence, open the visual clue only when you need it, and watch the heart-drum tracker change expression as wrong tries build up.</p><button class="button primary" id="startBtn">Start game</button></section>`;
}
function renderPlay(){
  const screen = currentScreen();
  const active = getActiveOccurrence(screen);
  const complete = screenSolved(screen);
  return `<div class="main-layout"><section class="card screen-card"><div class="top-row"><div class="label-pill">${escapeHtml(screen.label)}</div><div class="progress">Screen ${state.screenIndex + 1} of ${state.screens.length}</div></div><p class="prompt">${escapeHtml(screen.prompt)}</p><div class="sentence-panel">${buildSentenceMarkup(screen)}</div>${visualMarkup(screen)}<div class="controls"><button class="button primary" id="checkBtn" ${active && active.occurrence.fail ? "disabled" : ""}>Check</button><button class="button secondary" id="readBtn">🔊 Read aloud</button><button class="button ghost" id="nextBtn" ${complete ? "" : "disabled"}>Next screen</button></div><div class="feedback ${state.feedbackTone}">${escapeHtml(state.feedback)}</div><details class="help"><summary>How to play</summary><div class="help-body"><p>Type the full missing word.</p><p>The first letter is shown first. A wrong non-blank answer reveals one more letter.</p><p>If all chances for the current word are used up, only that word flashes, then only that word resets.</p><p>Restarting the game randomizes the screen order again.</p></div></details></section><aside class="card side-card"><h2>Heart-drum tracker</h2><p class="mini">${escapeHtml(screen.demeritText)}</p>${renderPenaltyTracker(screen)}<p class="mini" style="margin-top:12px;">The tracker resets for the next word.</p></aside></div>`;
}
function renderComplete(){
  const items = state.screens.map((s, i) => `<li>Screen ${i + 1}: ${escapeHtml(s.sentence)}</li>`).join("");
  return `<section class="card hero"><div class="badge">✅ Game complete</div><h1>${escapeHtml(GAME_TITLE)}</h1><p>You completed all the sentence screens in a randomized order.</p><div class="complete-list"><h2>Completed screens</h2><ul>${items}</ul></div><div class="controls" style="justify-content:center; margin-top:20px;"><button class="button primary" id="restartBtn">Restart all</button><button class="button secondary" id="homeBtn">Return to start</button></div></section>`;
}
function render(){
  const app = document.getElementById("app");
  if(!app) return;
  if(state.view === "intro") app.innerHTML = renderIntro();
  else if(state.view === "play") app.innerHTML = renderPlay();
  else app.innerHTML = renderComplete();
  bindEvents();
}
function bindEvents(){
  const startBtn = document.getElementById("startBtn");
  if(startBtn) startBtn.addEventListener("click", startGame);
  const restartBtn = document.getElementById("restartBtn");
  if(restartBtn) restartBtn.addEventListener("click", restartAll);
  const homeBtn = document.getElementById("homeBtn");
  if(homeBtn) homeBtn.addEventListener("click", backToStart);
  const checkBtn = document.getElementById("checkBtn");
  if(checkBtn) checkBtn.addEventListener("click", checkGuess);
  const nextBtn = document.getElementById("nextBtn");
  if(nextBtn) nextBtn.addEventListener("click", moveNext);
  const readBtn = document.getElementById("readBtn");
  if(readBtn){
    readBtn.addEventListener("click", () => {
      if(state.view === "play"){
        const screen = currentScreen();
        let visualText = "The heart and blood vessels move blood around the body.";
        if(screen.visualType === "circulation_flow") visualText = "Digested food and oxygen are carried to different parts of the body.";
        if(screen.visualType === "waste_flow") visualText = "Waste materials are carried away from body parts for removal.";
        speakText([GAME_TITLE, screen.label, screen.prompt, sentenceForReadAloud(screen), visualText, state.feedback].filter(Boolean).join(". "));
      } else if(state.view === "intro"){
        speakText(`${GAME_TITLE}. Read each sentence and type the missing science word.`);
      } else {
        speakText(`${GAME_TITLE}. You completed all screens.`);
      }
    });
  }
  const input = document.getElementById("activeGuessInput");
  if(input){
    input.addEventListener("input", e => handleInputChange(e.target.value));
    input.addEventListener("keydown", e => {
      if(e.key === "Enter"){ e.preventDefault(); checkGuess(); }
    });
  }
}
render();
</script>

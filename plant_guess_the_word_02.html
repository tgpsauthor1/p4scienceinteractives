<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaves Guess-the-Word Game</title>
  <style>
    :root {
      --bg1: #f4fff9;
      --bg2: #ecf4ff;
      --panel: #ffffff;
      --ink: #17324d;
      --muted: #5c728f;
      --line: #d8e4f6;
      --accent: #2a69f0;
      --accent-dark: #1049b3;
      --good: #137a44;
      --warn: #9c6100;
      --bad: #a22323;
      --shadow: 0 14px 34px rgba(23, 50, 77, 0.09);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    .app-shell {
      min-height: 100vh;
      padding: 20px 14px 28px;
      display: flex;
      justify-content: center;
    }

    .app {
      width: min(1100px, 100%);
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }

    .hero p {
      margin: 0 auto 20px;
      max-width: 760px;
      font-size: 1.12rem;
      line-height: 1.55;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      padding: 10px 16px;
      background: #eef5ff;
      border: 2px solid #cfe0ff;
      color: var(--accent-dark);
      font-weight: 800;
      margin-bottom: 18px;
    }

    .button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      min-height: 54px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 800;
      transition: transform 0.12s ease, background 0.12s ease, opacity 0.12s ease;
    }

    .button:hover { transform: translateY(-1px); }
    .button:active { transform: translateY(0); }
    .button[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .button.primary {
      background: var(--accent);
      color: white;
    }

    .button.primary:hover {
      background: var(--accent-dark);
    }

    .button.secondary {
      background: #eff5ff;
      color: var(--accent-dark);
      border: 2px solid #d0e0ff;
    }

    .button.ghost {
      background: #f8fbff;
      color: var(--ink);
      border: 2px solid #d7e4f6;
    }

    .main-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 16px;
      align-items: start;
    }

    .screen-card {
      padding: 22px;
    }

    .side-card {
      padding: 18px;
      position: sticky;
      top: 16px;
    }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .label-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 14px;
      background: #eef5ff;
      border: 2px solid #d2e0ff;
      color: var(--accent-dark);
      font-weight: 800;
    }

    .progress {
      font-size: 0.98rem;
      color: var(--muted);
      font-weight: 800;
    }

    .prompt {
      font-size: clamp(1.2rem, 2vw, 1.55rem);
      font-weight: 900;
      margin: 0 0 18px;
    }

    .sentence-panel {
      border: 2px solid #d8e4f6;
      border-radius: 18px;
      background: #fbfdff;
      padding: 18px;
      font-size: clamp(1.28rem, 2.3vw, 1.72rem);
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .plain-token {
      white-space: pre-wrap;
    }

    .guess-wrap {
      display: inline-flex;
      vertical-align: middle;
      margin: 0 4px;
    }

    .guess-chip {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 150px;
      padding: 10px 10px 12px;
      border-radius: 16px;
      border: 2px solid #bfd1ff;
      background: #f3f7ff;
    }

    .guess-chip.future {
      background: #f8fbff;
      border-color: #d6e1f4;
    }

    .guess-chip.solved {
      background: #eefaf2;
      border-color: #bfe5ca;
    }

    .guess-chip.fail {
      background: #fff2f2;
      border-color: #f0c5c5;
      animation: pulse 0.9s infinite;
    }

    .clue {
      font-size: 1.06rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      color: var(--accent-dark);
      text-transform: lowercase;
      min-height: 1.2em;
    }

    .solved-word, .flash-word {
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 1.15rem;
      font-weight: 900;
    }

    .solved-word {
      color: var(--good);
      background: #e8f8ee;
    }

    .flash-word {
      color: var(--bad);
      background: #ffe2e2;
    }

    .guess-input {
      width: 180px;
      min-width: 120px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid #97b8f5;
      font-size: 1rem;
      font-weight: 800;
      text-align: center;
      color: var(--ink);
      background: #fff;
    }

    .guess-input:focus {
      outline: 3px solid rgba(42, 105, 240, 0.18);
      border-color: var(--accent);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
    }

    .feedback {
      margin-top: 14px;
      min-height: 58px;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.5;
      border: 2px solid #dce6f7;
      background: #f7fbff;
    }

    .feedback.good {
      background: #eefaf2;
      border-color: #bfe5ca;
      color: var(--good);
    }

    .feedback.warn {
      background: #fff8ee;
      border-color: #f1d6ad;
      color: var(--warn);
    }

    .feedback.bad {
      background: #fff2f2;
      border-color: #f0c5c5;
      color: var(--bad);
    }

    .side-card h2 {
      margin: 0 0 12px;
      font-size: 1.18rem;
    }

    .mini {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.97rem;
      line-height: 1.45;
    }

    .tracker-frame {
      border: 2px solid #d8e4f6;
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(180deg, #fbfffd 0%, #f4fbff 100%);
    }

    .tracker-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .face-bubble {
      width: 84px;
      height: 84px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 2.15rem;
      border: 3px solid #d7e3f6;
      box-shadow: 0 8px 18px rgba(23, 50, 77, 0.08);
      background: linear-gradient(180deg, #f7fff9 0%, #edfff2 100%);
    }

    .face-bubble.worried { background: linear-gradient(180deg, #fff9ef 0%, #fff0d8 100%); }
    .face-bubble.angry { background: linear-gradient(180deg, #fff3f3 0%, #ffe0e0 100%); }
    .face-bubble.fail { background: linear-gradient(180deg, #f7f1ff 0%, #ece2ff 100%); }

    .face-caption {
      min-height: 1.3em;
      font-size: 0.97rem;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
    }

    .tracker-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .tracker-chip {
      min-width: 34px;
      min-height: 34px;
      padding: 4px 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      border: 2px solid #d5e2f6;
      background: #fff;
    }

    .tracker-chip.lost {
      opacity: 0.42;
      filter: grayscale(1);
    }

    .tracker-stats {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--muted);
    }

    .scene {
      min-height: 170px;
      display: grid;
      place-items: center;
      padding: 10px 6px;
    }

    .plant-character {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transform-origin: center bottom;
      transition: transform 0.2s ease;
    }

    .plant-head {
      width: 88px;
      height: 88px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 2.1rem;
      background: radial-gradient(circle at 30% 25%, #8be38b 0%, #4dbd68 58%, #2a8b4c 100%);
      border: 3px solid #2a8b4c;
      color: #143b20;
    }

    .stem {
      width: 8px;
      height: 62px;
      border-radius: 999px;
      background: linear-gradient(180deg, #4db576 0%, #2b8f56 100%);
      position: relative;
    }

    .stem::before,
    .stem::after {
      content: "";
      position: absolute;
      width: 42px;
      height: 16px;
      background: linear-gradient(90deg, #59c57d 0%, #2f9759 100%);
      border-radius: 999px 999px 999px 0;
      top: 16px;
    }

    .stem::before {
      left: -37px;
      transform: rotate(-25deg);
    }

    .stem::after {
      right: -37px;
      transform: scaleX(-1) rotate(-25deg);
    }

    .pot {
      width: 108px;
      height: 54px;
      border-radius: 10px 10px 18px 18px;
      background: linear-gradient(180deg, #ab724e 0%, #835235 100%);
      position: relative;
    }

    .pot::before {
      content: "";
      position: absolute;
      left: -6px;
      right: -6px;
      top: -10px;
      height: 14px;
      border-radius: 14px;
      background: linear-gradient(180deg, #b97a55 0%, #8f5b3d 100%);
    }

    .food-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .student-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .student-head {
      width: 86px;
      height: 86px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 2.1rem;
      border: 3px solid #e2c089;
      background: radial-gradient(circle at 32% 25%, #ffe6b8 0%, #ffd397 60%, #efbd78 100%);
    }

    .student-body {
      width: 92px;
      height: 74px;
      border-radius: 18px;
      background: linear-gradient(180deg, #6ca8ff 0%, #4c7ce0 100%);
      position: relative;
    }

    .student-body::before,
    .student-body::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 52px;
      background: #6ca8ff;
      top: 14px;
      border-radius: 999px;
    }

    .student-body::before { left: -10px; transform: rotate(18deg); }
    .student-body::after { right: -10px; transform: rotate(-18deg); }

    .hungry-fail {
      min-height: 170px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--bad);
      font-weight: 900;
      line-height: 1.45;
      background: #fff4f4;
      border: 2px dashed #efc1c1;
      border-radius: 16px;
      padding: 12px;
    }

    .sharp-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .sharp-leaf {
      width: 118px;
      height: 150px;
      position: relative;
      display: grid;
      place-items: center;
      font-size: 2rem;
      color: #15411e;
      background: linear-gradient(180deg, #85dd88 0%, #43b75b 65%, #2b9447 100%);
      clip-path: polygon(50% 0%, 72% 8%, 84% 16%, 94% 30%, 98% 46%, 94% 60%, 84% 74%, 70% 90%, 50% 100%, 30% 90%, 16% 74%, 6% 60%, 2% 46%, 6% 30%, 16% 16%, 28% 8%);
      border: 3px solid #2b9447;
    }

    .sharp-leaf.more-spiky {
      clip-path: polygon(50% 0%, 63% 6%, 77% 7%, 85% 18%, 97% 24%, 91% 37%, 100% 50%, 91% 63%, 97% 77%, 83% 82%, 76% 94%, 62% 94%, 50% 100%, 38% 94%, 24% 94%, 17% 82%, 3% 77%, 9% 63%, 0% 50%, 9% 37%, 3% 24%, 15% 18%, 23% 7%, 37% 6%);
    }

    .leaf-stem {
      width: 8px;
      height: 50px;
      border-radius: 999px;
      background: linear-gradient(180deg, #5abf70 0%, #298746 100%);
    }

    .stalk-scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .top-leaves {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .stalk-leaf {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 1.25rem;
    }

    .stalk-line {
      width: 8px;
      height: 42px;
      border-radius: 999px;
      background: linear-gradient(180deg, #61c779 0%, #2b8f56 100%);
    }

    .stalk-line.detached {
      opacity: 0.35;
      transform: rotate(35deg) translateY(4px);
      transform-origin: top center;
    }

    .big-stem {
      width: 12px;
      height: 90px;
      border-radius: 999px;
      background: linear-gradient(180deg, #4db576 0%, #267d4a 100%);
    }

    .big-stem.fallen {
      transform: rotate(72deg) translateX(12px);
      transform-origin: bottom center;
    }

    details.help {
      margin-top: 18px;
      border: 2px solid #d8e4f6;
      border-radius: 16px;
      overflow: hidden;
      background: #fbfdff;
    }

    details.help summary {
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 800;
      user-select: none;
      list-style: none;
    }

    details.help summary::-webkit-details-marker {
      display: none;
    }

    .help-body {
      padding: 0 16px 16px;
      border-top: 2px solid #e5edf9;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.98rem;
    }

    .help-body p { margin: 12px 0 0; }

    .complete-list {
      margin: 18px auto 0;
      max-width: 760px;
      text-align: left;
      border: 2px solid #d8e4f6;
      border-radius: 18px;
      background: #fbfdff;
      padding: 16px 18px;
    }

    .complete-list h2 {
      margin: 0 0 10px;
      font-size: 1.15rem;
    }

    .complete-list ul {
      margin: 0;
      padding-left: 20px;
      line-height: 1.7;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    @media (max-width: 920px) {
      .main-layout {
        grid-template-columns: 1fr;
      }
      .side-card {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .app-shell {
        padding: 14px 10px 22px;
      }
      .hero, .screen-card, .side-card {
        padding: 18px;
      }
      .sentence-panel {
        font-size: 1.16rem;
        line-height: 1.75;
      }
      .guess-chip {
        min-width: 130px;
      }
      .guess-input {
        width: min(160px, 52vw);
      }
      .controls {
        align-items: stretch;
      }
      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="app" class="app" aria-live="polite"></div>
  </div>

  <script>
    const GAME_TITLE = "Leaves Guess-the-Word Game";
    const RAW_SCREENS = [{"label": "Screen 1", "prompt": "Type the missing science word.", "sentence": "Leaves help the plant in the exchange of gases.", "targets": ["Leaves"], "demeritText": "Another leaf withers away.", "failText": "The plant suffocates and dies.", "theme": "wither_plant"}, {"label": "Screen 2", "prompt": "Type the missing science word.", "sentence": "Leaves help the plant in the exchange of gases.", "targets": ["exchange"], "demeritText": "Another leaf withers away.", "failText": "The plant suffocates and dies.", "theme": "wither_plant"}, {"label": "Screen 3", "prompt": "Type the missing science word.", "sentence": "Leaves help the plant in the exchange of gases.", "targets": ["gases"], "demeritText": "Another leaf withers away.", "failText": "The plant suffocates and dies.", "theme": "wither_plant"}, {"label": "Screen 4", "prompt": "Type the missing science word.", "sentence": "Leaves contain a green substance to absorb light.", "targets": ["Leaves"], "demeritText": "More food is taken away from the student as the student gets angrier.", "failText": "The student faints from lack of food.", "theme": "hungry_student"}, {"label": "Screen 5", "prompt": "Type the missing science word.", "sentence": "Leaves contain a green substance to absorb light.", "targets": ["absorb"], "demeritText": "More food is taken away from the student as the student gets angrier.", "failText": "The student faints from lack of food.", "theme": "hungry_student"}, {"label": "Screen 6", "prompt": "Type the missing science word.", "sentence": "Leaves contain a green substance to absorb light.", "targets": ["light"], "demeritText": "More food is taken away from the student as the student gets angrier.", "failText": "The student faints from lack of food.", "theme": "hungry_student"}, {"label": "Screen 7", "prompt": "Type the missing science word.", "sentence": "Leaves absorb light to make food.", "targets": ["Leaves"], "demeritText": "The plant becomes smaller and angrier.", "failText": "The plant screams that it is hungry.", "theme": "shrinking_plant"}, {"label": "Screen 8", "prompt": "Type the missing science word.", "sentence": "Leaves absorb light to make food.", "targets": ["absorb"], "demeritText": "The plant becomes smaller and angrier.", "failText": "The plant screams that it is hungry.", "theme": "shrinking_plant"}, {"label": "Screen 9", "prompt": "Type the missing science word.", "sentence": "Leaves absorb light to make food.", "targets": ["food"], "demeritText": "The plant becomes smaller and angrier.", "failText": "The plant screams that it is hungry.", "theme": "shrinking_plant"}, {"label": "Screen 10", "prompt": "Type the missing science word.", "sentence": "The edges of the leaves determine the shape of the leaves.", "targets": ["edges"], "demeritText": "The leaf has more sharp edges.", "failText": "The leaf flies away.", "theme": "sharp_leaf"}, {"label": "Screen 11", "prompt": "Type the missing science word.", "sentence": "The edges of the leaves determine the shape of the leaves.", "targets": ["shape"], "demeritText": "The leaf has more sharp edges.", "failText": "The leaf flies away.", "theme": "sharp_leaf"}, {"label": "Screen 12", "prompt": "Type the missing science word.", "sentence": "The leaf stalk attaches the leaf to the stem of the plant.", "targets": ["stalk"], "demeritText": "One more leaf stalk detaches itself from the plant.", "failText": "The stem falls.", "theme": "detaching_stalk"}, {"label": "Screen 13", "prompt": "Type the missing science word.", "sentence": "The leaf stalk attaches the leaf to the stem of the plant.", "targets": ["stem"], "demeritText": "One more leaf stalk detaches itself from the plant.", "failText": "The stem falls.", "theme": "detaching_stalk"}];
    const FLASH_DURATION_MS = 10000;

    const state = {
      view: "intro",
      screenIndex: 0,
      screens: [],
      currentInput: "",
      feedback: "",
      feedbackTone: "warn"
    };

    function normalizeWord(text) {
      return (text || "").toLowerCase().replace(/[^a-z0-9]/gi, "");
    }

    function tokenize(sentence) {
      return sentence.match(/(\s+|[A-Za-z']+|[^A-Za-z'\s]+)/g) || [];
    }

    function prepareScreens(rawScreens) {
      return rawScreens.map(screen => {
        const tokens = tokenize(screen.sentence);
        const targetSet = new Set(screen.targets.map(t => normalizeWord(t)));
        const occurrences = [];

        tokens.forEach((token, tokenIndex) => {
          const normalized = normalizeWord(token);
          if (normalized && targetSet.has(normalized)) {
            occurrences.push({
              tokenIndex,
              originalToken: token,
              target: token,
              solved: false,
              fail: false,
              wrongAttempts: 0,
              revealedCount: 1,
              chanceLimit: Math.max(normalized.length - 2, 1)
            });
          }
        });

        return {
          ...screen,
          tokens,
          occurrences
        };
      });
    }

    function activeOccurrenceIndex(screen) {
      return screen.occurrences.findIndex(o => !o.solved);
    }

    function getActiveOccurrence(screen) {
      const index = activeOccurrenceIndex(screen);
      if (index === -1) return null;
      return { index, occurrence: screen.occurrences[index] };
    }

    function clueText(target, revealedCount) {
      const clean = target.replace(/[^A-Za-z0-9]/g, "");
      const shown = clean.slice(0, Math.max(1, revealedCount));
      const hidden = clean.slice(Math.max(1, revealedCount)).split("").map(() => "_").join(" ");
      return hidden ? `${shown} ${hidden}` : shown;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(text) {
      return escapeHtml(text).replace(/`/g, "&#96;");
    }

    function clearSpeech() {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    }

    function speakText(text) {
      if (!("speechSynthesis" in window)) return;
      clearSpeech();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.96;
      u.pitch = 1;
      window.speechSynthesis.speak(u);
    }

    function currentScreen() {
      return state.screens[state.screenIndex];
    }

    function screenSolved(screen) {
      return screen.occurrences.every(o => o.solved);
    }

    function sentenceForReadAloud(screen) {
      return screen.tokens.map((token, tokenIndex) => {
        const occIndex = screen.occurrences.findIndex(o => o.tokenIndex === tokenIndex);
        if (occIndex === -1) return token;
        const occ = screen.occurrences[occIndex];
        if (occ.solved || occ.fail) return occ.originalToken;
        return "blank";
      }).join("");
    }

    function updateFeedback(text, tone) {
      state.feedback = text;
      state.feedbackTone = tone;
    }

    function startGame() {
      state.screens = prepareScreens(RAW_SCREENS);
      state.view = "play";
      state.screenIndex = 0;
      state.currentInput = "";
      updateFeedback("Type the full missing word and tap Check.", "warn");
      render();
      focusActiveInput();
    }

    function restartAll() {
      clearSpeech();
      startGame();
    }

    function backToStart() {
      clearSpeech();
      state.view = "intro";
      state.screenIndex = 0;
      state.screens = [];
      state.currentInput = "";
      state.feedback = "";
      state.feedbackTone = "warn";
      render();
    }

    function focusActiveInput() {
      requestAnimationFrame(() => {
        const input = document.getElementById("activeGuessInput");
        if (input && !input.disabled) {
          input.focus();
          input.select();
        }
      });
    }

    function moveNext() {
      if (state.screenIndex < state.screens.length - 1) {
        state.screenIndex += 1;
        state.currentInput = "";
        updateFeedback("Type the full missing word and tap Check.", "warn");
        render();
        focusActiveInput();
      } else {
        state.view = "complete";
        render();
      }
    }

    function handleInputChange(value) {
      state.currentInput = value.replace(/\s+/g, "");
    }

    function resetFailedOccurrence(screen, occ) {
      occ.fail = false;
      occ.wrongAttempts = 0;
      occ.revealedCount = 1;
      state.currentInput = "";
      updateFeedback("That word has reset. Try again from the first clue.", "warn");
      render();
      focusActiveInput();
    }

    function checkGuess() {
      const screen = currentScreen();
      if (!screen) return;
      const active = getActiveOccurrence(screen);
      if (!active) return;

      const occ = active.occurrence;
      if (occ.fail) return;

      const guess = state.currentInput.trim();
      if (!guess) {
        updateFeedback("Type the full word first.", "warn");
        render();
        focusActiveInput();
        return;
      }

      if (normalizeWord(guess) === normalizeWord(occ.target)) {
        occ.solved = true;
        occ.fail = false;
        state.currentInput = "";
        updateFeedback(screenSolved(screen) ? "Correct. This sentence is complete." : "Correct. Now solve the next missing word.", "good");
        render();
        focusActiveInput();
        return;
      }

      occ.wrongAttempts += 1;
      occ.revealedCount = Math.min(normalizeWord(occ.target).length, occ.revealedCount + 1);

      if (occ.wrongAttempts >= occ.chanceLimit) {
        occ.fail = true;
        updateFeedback(screen.failText, "bad");
        render();
        window.setTimeout(() => {
          resetFailedOccurrence(screen, occ);
        }, FLASH_DURATION_MS);
        return;
      }

      updateFeedback(screen.demeritText + " One more letter is now shown.", "warn");
      render();
      focusActiveInput();
    }

    function buildSentenceMarkup(screen) {
      const active = getActiveOccurrence(screen);
      const activeIndex = active ? active.index : -1;

      return screen.tokens.map((token, tokenIndex) => {
        const occIndex = screen.occurrences.findIndex(o => o.tokenIndex === tokenIndex);
        if (occIndex === -1) {
          return `<span class="plain-token">${escapeHtml(token)}</span>`;
        }

        const occ = screen.occurrences[occIndex];
        if (occ.solved) {
          return `<span class="guess-wrap"><span class="guess-chip solved"><span class="solved-word">${escapeHtml(occ.originalToken)}</span></span></span>`;
        }

        if (occ.fail) {
          return `<span class="guess-wrap"><span class="guess-chip fail"><span class="flash-word">${escapeHtml(occ.originalToken)}</span></span></span>`;
        }

        if (occIndex === activeIndex) {
          const width = Math.max(120, normalizeWord(occ.target).length * 18 + 80);
          return `
            <span class="guess-wrap">
              <label class="guess-chip" aria-label="Missing word input">
                <span class="clue">${escapeHtml(clueText(occ.target, occ.revealedCount))}</span>
                <input
                  id="activeGuessInput"
                  class="guess-input"
                  type="text"
                  autocomplete="off"
                  autocapitalize="none"
                  spellcheck="false"
                  inputmode="text"
                  maxlength="${normalizeWord(occ.target).length + 2}"
                  placeholder="Type full word"
                  style="width:${width}px"
                  value="${escapeAttribute(state.currentInput)}"
                />
              </label>
            </span>
          `;
        }

        return `<span class="guess-wrap"><span class="guess-chip future"><span class="clue">${escapeHtml(clueText(occ.target, 1))}</span></span></span>`;
      }).join("");
    }

    function faceStateByRatio(theme, used, total, fail) {
      if (fail) {
        return { faceClass: "fail", emoji: theme === "hungry_student" ? "😵" : "👻", caption: failCaption(theme) };
      }
      if (used === 0) {
        if (theme === "hungry_student") return { faceClass: "", emoji: "🙂", caption: "The student still has food." };
        if (theme === "sharp_leaf") return { faceClass: "", emoji: "😌", caption: "The leaf looks smooth." };
        if (theme === "detaching_stalk") return { faceClass: "", emoji: "🙂", caption: "The stem is standing tall." };
        return { faceClass: "", emoji: "😄", caption: "Everything looks healthy." };
      }
      const ratio = used / total;
      if (ratio < 0.5) {
        if (theme === "hungry_student") return { faceClass: "worried", emoji: "😟", caption: "The student is getting hungry." };
        if (theme === "sharp_leaf") return { faceClass: "worried", emoji: "😬", caption: "The leaf is getting pointier." };
        if (theme === "detaching_stalk") return { faceClass: "worried", emoji: "😧", caption: "A stalk is starting to pull away." };
        return { faceClass: "worried", emoji: "😟", caption: "The plant looks worried." };
      }
      if (theme === "hungry_student") return { faceClass: "angry", emoji: "😠", caption: "The student is very hungry now." };
      if (theme === "sharp_leaf") return { faceClass: "angry", emoji: "😖", caption: "The leaf has many sharp edges now." };
      if (theme === "detaching_stalk") return { faceClass: "angry", emoji: "😣", caption: "More stalks are detaching." };
      return { faceClass: "angry", emoji: "😭", caption: "The plant looks upset now." };
    }

    function failCaption(theme) {
      if (theme === "hungry_student") return "The student has fainted.";
      if (theme === "sharp_leaf") return "The leaf has flown away.";
      if (theme === "detaching_stalk") return "The stem has fallen.";
      if (theme === "shrinking_plant") return "The plant is too hungry.";
      return "The plant has failed.";
    }

    function renderTrackerTheme(theme, used, total, fail, screen) {
      const left = Math.max(total - used, 0);
      const face = faceStateByRatio(theme, used, total, fail);

      if (theme === "hungry_student") {
        if (fail) {
          return `
            <div class="tracker-frame">
              <div class="hungry-fail">
                <div class="tracker-top">
                  <div class="face-bubble fail">😵</div>
                  <div class="face-caption">${escapeHtml(failCaption(theme))}</div>
                </div>
                <div>${escapeHtml(screen.failText)}</div>
              </div>
            </div>
          `;
        }
        const goodFood = Array.from({ length: left }, () => `<span class="tracker-chip">🍱</span>`).join("");
        const lostFood = Array.from({ length: used }, () => `<span class="tracker-chip lost">🍽️</span>`).join("");
        return `
          <div class="tracker-frame">
            <div class="food-row">${goodFood}${lostFood}</div>
            <div class="scene">
              <div class="student-wrap">
                <div class="tracker-top">
                  <div class="face-bubble ${face.faceClass}">${face.emoji}</div>
                  <div class="face-caption">${face.caption}</div>
                </div>
                <div class="student-body" aria-hidden="true"></div>
              </div>
            </div>
            <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Food left: ${left}</span></div>
          </div>
        `;
      }

      if (theme === "sharp_leaf") {
        if (fail) {
          return `
            <div class="tracker-frame">
              <div class="hungry-fail">
                <div class="tracker-top">
                  <div class="face-bubble fail">🍃</div>
                  <div class="face-caption">${escapeHtml(failCaption(theme))}</div>
                </div>
                <div>💨<br>${escapeHtml(screen.failText)}</div>
              </div>
            </div>
          `;
        }
        const chips = Array.from({ length: total }, (_, i) => `<span class="tracker-chip ${i < used ? "lost" : ""}">${i < used ? "▲" : "🍃"}</span>`).join("");
        return `
          <div class="tracker-frame">
            <div class="tracker-row">${chips}</div>
            <div class="scene">
              <div class="sharp-wrap">
                <div class="tracker-top">
                  <div class="face-bubble ${face.faceClass}">${face.emoji}</div>
                  <div class="face-caption">${face.caption}</div>
                </div>
                <div class="sharp-leaf ${used > 0 ? "more-spiky" : ""}">${used > 0 ? "😬" : "🙂"}</div>
                <div class="leaf-stem"></div>
              </div>
            </div>
            <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Smooth spots left: ${left}</span></div>
          </div>
        `;
      }

      if (theme === "detaching_stalk") {
        if (fail) {
          return `
            <div class="tracker-frame">
              <div class="hungry-fail">
                <div class="tracker-top">
                  <div class="face-bubble fail">🪴</div>
                  <div class="face-caption">${escapeHtml(failCaption(theme))}</div>
                </div>
                <div>${escapeHtml(screen.failText)}</div>
              </div>
            </div>
          `;
        }
        const stalks = Array.from({ length: total }, (_, i) => `
          <div class="stalk-leaf">
            <div>${i < used ? "🍂" : "🍃"}</div>
            <div class="stalk-line ${i < used ? "detached" : ""}"></div>
          </div>
        `).join("");
        return `
          <div class="tracker-frame">
            <div class="scene">
              <div class="stalk-scene">
                <div class="tracker-top">
                  <div class="face-bubble ${face.faceClass}">${face.emoji}</div>
                  <div class="face-caption">${face.caption}</div>
                </div>
                <div class="top-leaves">${stalks}</div>
                <div class="big-stem"></div>
              </div>
            </div>
            <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Attached stalks left: ${left}</span></div>
          </div>
        `;
      }

      // plant themes
      if (fail) {
        const failEmoji = theme === "shrinking_plant" ? "😫" : "👻";
        return `
          <div class="tracker-frame">
            <div class="hungry-fail">
              <div class="tracker-top">
                <div class="face-bubble fail">${failEmoji}</div>
                <div class="face-caption">${escapeHtml(failCaption(theme))}</div>
              </div>
              <div>${escapeHtml(screen.failText)}</div>
            </div>
          </div>
        `;
      }

      const leafGood = Array.from({ length: left }, () => `<span class="tracker-chip">🍃</span>`).join("");
      const leafLost = Array.from({ length: used }, () => `<span class="tracker-chip lost">🍂</span>`).join("");
      const scale = theme === "shrinking_plant" ? Math.max(0.58, 1 - used * 0.11) : 1;
      const headEmoji = theme === "shrinking_plant" ? (used === 0 ? "😄" : (used < total / 2 ? "😟" : "😠")) : face.emoji;
      return `
        <div class="tracker-frame">
          <div class="tracker-row">${leafGood}${leafLost}</div>
          <div class="scene">
            <div class="plant-character" style="transform: scale(${scale});">
              <div class="tracker-top">
                <div class="face-bubble ${face.faceClass}">${headEmoji}</div>
                <div class="face-caption">${face.caption}</div>
              </div>
              <div class="plant-head">${headEmoji}</div>
              <div class="stem"></div>
              <div class="pot"></div>
            </div>
          </div>
          <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Leaves left: ${left}</span></div>
        </div>
      `;
    }

    function trackerMarkup(screen) {
      const active = getActiveOccurrence(screen);
      if (!active) {
        return `
          <div class="tracker-frame">
            <div class="scene">
              <div class="tracker-top">
                <div class="face-bubble">😄</div>
                <div class="face-caption">This screen is complete.</div>
              </div>
            </div>
          </div>
        `;
      }

      const occ = active.occurrence;
      return renderTrackerTheme(screen.theme, occ.wrongAttempts, occ.chanceLimit, occ.fail, screen);
    }

    function renderIntro() {
      return `
        <section class="card hero">
          <div class="badge">🍃 Guess the missing science word</div>
          <h1>${escapeHtml(GAME_TITLE)}</h1>
          <p>
            Read each sentence, type the full missing word inside the sentence,
            and watch the penalty tracker change expression as wrong tries build up.
          </p>
          <button class="button primary" id="startBtn">Start game</button>
        </section>
      `;
    }

    function renderPlay() {
      const screen = currentScreen();
      const active = getActiveOccurrence(screen);
      const complete = screenSolved(screen);

      return `
        <div class="main-layout">
          <section class="card screen-card">
            <div class="top-row">
              <div class="label-pill">${escapeHtml(screen.label)}</div>
              <div class="progress">Screen ${state.screenIndex + 1} of ${state.screens.length}</div>
            </div>

            <p class="prompt">${escapeHtml(screen.prompt)}</p>

            <div class="sentence-panel">${buildSentenceMarkup(screen)}</div>

            <div class="controls">
              <button class="button primary" id="checkBtn" ${active && active.occurrence.fail ? "disabled" : ""}>Check</button>
              <button class="button secondary" id="readBtn">🔊 Read aloud</button>
              <button class="button ghost" id="nextBtn" ${complete ? "" : "disabled"}>Next screen</button>
            </div>

            <div class="feedback ${state.feedbackTone}">${escapeHtml(state.feedback)}</div>

            <details class="help">
              <summary>How to play</summary>
              <div class="help-body">
                <p>Type the full missing word.</p>
                <p>The first letter is shown first. A wrong non-blank answer reveals one more letter.</p>
                <p>If all chances for the current word are used up, only that word flashes, then only that word resets.</p>
              </div>
            </details>
          </section>

          <aside class="card side-card">
            <h2>Penalty tracker</h2>
            <p class="mini">${escapeHtml(screen.demeritText)}</p>
            ${trackerMarkup(screen)}
            <p class="mini" style="margin-top:12px;">The tracker resets for the next word.</p>
          </aside>
        </div>
      `;
    }

    function renderComplete() {
      const items = state.screens.map((s, i) => `<li>Screen ${i + 1}: ${escapeHtml(s.sentence)}</li>`).join("");
      return `
        <section class="card hero">
          <div class="badge">✅ Game complete</div>
          <h1>${escapeHtml(GAME_TITLE)}</h1>
          <p>You completed all the sentence screens.</p>
          <div class="complete-list">
            <h2>Completed screens</h2>
            <ul>${items}</ul>
          </div>
          <div class="controls" style="justify-content:center; margin-top:20px;">
            <button class="button primary" id="restartBtn">Restart all</button>
            <button class="button secondary" id="homeBtn">Return to start</button>
          </div>
        </section>
      `;
    }

    function render() {
      const app = document.getElementById("app");
      if (!app) return;
      if (state.view === "intro") app.innerHTML = renderIntro();
      else if (state.view === "play") app.innerHTML = renderPlay();
      else app.innerHTML = renderComplete();
      bindEvents();
    }

    function bindEvents() {
      const startBtn = document.getElementById("startBtn");
      if (startBtn) startBtn.addEventListener("click", startGame);

      const restartBtn = document.getElementById("restartBtn");
      if (restartBtn) restartBtn.addEventListener("click", restartAll);

      const homeBtn = document.getElementById("homeBtn");
      if (homeBtn) homeBtn.addEventListener("click", backToStart);

      const checkBtn = document.getElementById("checkBtn");
      if (checkBtn) checkBtn.addEventListener("click", checkGuess);

      const nextBtn = document.getElementById("nextBtn");
      if (nextBtn) nextBtn.addEventListener("click", moveNext);

      const readBtn = document.getElementById("readBtn");
      if (readBtn) {
        readBtn.addEventListener("click", () => {
          if (state.view === "play") {
            const screen = currentScreen();
            speakText([GAME_TITLE, screen.label, screen.prompt, sentenceForReadAloud(screen), state.feedback].filter(Boolean).join(". "));
          } else if (state.view === "intro") {
            speakText(`${GAME_TITLE}. Read each sentence and type the missing science word.`);
          } else {
            speakText(`${GAME_TITLE}. You completed all screens.`);
          }
        });
      }

      const input = document.getElementById("activeGuessInput");
      if (input) {
        input.addEventListener("input", (e) => {
          handleInputChange(e.target.value);
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            checkGuess();
          }
        });
      }
    }

    render();
  </script>
</body>
</html>

<style>
:root{--bg1:#f6fff7;--bg2:#eef7ff;--ink:#1f3344;--muted:#64748b;--card:#fff;--shadow:0 12px 28px rgba(15,23,42,.10);--good:#15803d;--warn:#b45309}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:linear-gradient(135deg,var(--bg1),var(--bg2))}
.wrap{max-width:1120px;margin:auto;padding:16px} .shell{background:rgba(255,255,255,.94);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}

svg{max-width:100%;height:auto}

</style>

  const objs = []; const occ = [];
  raw.targets.forEach(t=>{if(norm(t).length<3) throw new Error('Short target: '+t)})
  for(const tok of tokens){
    if(/^[A-Za-z]+$/.test(tok) && targetSet.has(norm(tok))){

      objs.push({type:'occ', id:occ.length-1});

function current(){return screens[idx]}
function renderIntro(){
  setStatus('Ready');
  q('#app').innerHTML = `<div class="screen"><div class="hero"><div class="card"><h2>Guess the plant science words</h2><p>Every card has a picture clue at the top. Then type the missing science word inside the sentence. The playable cards are shuffled each time you restart.</p><div class="row" style="margin-top:16px"><button class="primary" id="startBtn">Start game</button><button class="secondary" id="readIntroBtn">Read aloud</button></div></div><div class="card"><div class="visual">${vis('stem_transport')}</div></div></div><details open><summary>How to play</summary><div class="body"><p>Look at the picture clue. Type the full missing word. One word is active at a time. Wrong answers reveal one more letter. Blank tries do not count. If a word runs out of tries, only that word flashes for 10 seconds and then resets.</p></div></details></div>`;
  q('#startBtn').onclick = () => { idx = 0; renderGame(); };
  q('#readIntroBtn').onclick = () => speak('Guess the plant science words. Every card has a picture clue at the top. Then type the missing science word inside the sentence. The playable cards are shuffled each time you restart.');
}
function renderGame(){
  const s = current();
  if(!s.seen){ s.open = true; s.seen = true; }
  setStatus(`Card ${idx+1} / ${screens.length}`);
  const o = s.done ? null : s.occ[s.active];
  const dots = o ? Array.from({length:o.limit}, (_,i)=>`<div class="dot ${i<o.wrong?'on':''}"></div>`).join('') : '';
  q('#app').innerHTML = `<div class="screen"><details id="pic" ${s.open?'open':''}><summary>Picture clue</summary><div class="body"><div class="visual">${vis(s.visual)}</div></div></details><div class="grid"><div class="card"><div class="row"><div class="chip">${esc(s.label)}</div><div class="chip">${idx+1} / ${screens.length}</div></div><div class="prompt">${esc(s.prompt)}</div><div class="sentence">${sent(s)}</div><div class="feedback ${s.tone||'neutral'}">${esc(s.fb||' ')}</div><div class="row"><button class="primary" id="checkBtn" ${s.done?'disabled':''}>Check</button><button class="secondary" id="readBtn">Read aloud</button><button class="ghost" id="restartBtn">Restart all</button><button class="primary" id="nextBtn" ${s.done?'':'disabled'}>Next card</button></div><div class="row" style="margin-top:12px"><div class="chip">Progress</div><div style="flex:1 1 220px"><div class="bar"><div style="width:${(idx/screens.length)*100}%"></div></div></div></div></div><div class="penalty"><div class="card stage"><div class="chip">Penalty</div><div style="min-height:128px;display:flex;align-items:center;justify-content:center">${o?faceSvg(s.theme,o.wrong,o.limit,o.fail):''}</div><div class="dots">${dots}</div></div></div></div><details><summary>How to play</summary><div class="body"><p>Look at the picture clue. Then type the full missing word inside the sentence. Case and punctuation do not matter. One active word at a time. Solved words stay solved.</p></div></details></div>`;
  q('#pic').ontoggle = ()=> current().open = q('#pic').open;
  const g = q('#guess');
  if(g){ g.focus(); g.oninput = e => current().occ[current().active].input = e.target.value; g.onkeydown = e => { if(e.key==='Enter'){ e.preventDefault(); checkWord(); } }; }
  q('#checkBtn').onclick = checkWord;
  q('#readBtn').onclick = ()=> speak(s.prompt + '. ' + s.objs.map(t=>t.type==='text'?t.text:(s.occ[t.id].solved||s.occ[t.id].fail?s.occ[t.id].word:'blank')).join(''));
  q('#restartBtn').onclick = start;
  q('#nextBtn').onclick = ()=>{ if(!current().done) return; if(idx < screens.length-1){ idx++; renderGame(); } else renderDone(); };
}
function checkWord(){
  const s = current(), o = s.occ[s.active];
  if(!o || o.fail || s.done) return;
  const val = (q('#guess') ? q('#guess').value : o.input || '').trim();
  o.input = val;
  if(!val){ s.fb='Type the whole word.'; s.tone='neutral'; renderGame(); return; }
  if(/\s/.test(val)){ s.fb='One word only.'; s.tone='warn'; renderGame(); return; }
  if(norm(val) === o.norm){
    o.solved = true; o.input = '';
    s.fb = s.active === s.occ.length-1 ? 'Well done.' : 'Good. Keep going.'; s.tone='ok';
    const n = s.occ.findIndex(x=>!x.solved);
    if(n===-1) s.done = true; else s.active = n;
    renderGame(); return;
  }
  o.wrong++; o.reveal = Math.min(o.word.length, o.reveal+1); o.input='';
  if(o.wrong >= o.limit){
    o.fail = true; s.fb='Watch this word.'; s.tone='warn'; renderGame();
    setTimeout(()=>{ const a=current(); if(!a) return; const c=a.occ[a.active]; if(!c) return; c.fail=false; c.wrong=0; c.reveal=1; c.input=''; a.fb='Try again.'; a.tone='neutral'; renderGame(); }, FAIL);
  } else { s.fb='Try again.'; s.tone='warn'; renderGame(); }
}
function renderDone(){
  setStatus('Finished');
  q('#app').innerHTML = `<div class="screen"><div class="card"><h2>You finished all ${screens.length} cards.</h2><p>Nice work. You can play again for a fresh randomized order.</p><div class="row" style="margin-top:16px"><button class="primary" id="againBtn">Play again</button><button class="secondary" id="doneReadBtn">Read aloud</button></div></div><div class="card"><div class="finish">${screens.map((_,i)=>`<div class="done">Card ${i+1}</div>`).join('')}</div></div></div>`;
  q('#againBtn').onclick = start;
  q('#doneReadBtn').onclick = ()=> speak(`You finished all ${screens.length} cards. You can play again for a fresh order.`);
}
function start(){ if(window.speechSynthesis) window.speechSynthesis.cancel(); screens = shuffle(rawScreens).map(buildScreen); idx = -1; renderIntro(); }
start();
</script>

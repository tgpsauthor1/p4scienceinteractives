<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Respiratory System Guess-the-Word Game</title>
  <style>
    :root {
      --bg1: #f5fbff;
      --bg2: #eef7ff;
      --panel: #ffffff;
      --ink: #17314d;
      --muted: #5b738f;
      --line: #d8e4f6;
      --accent: #2a69f0;
      --accent-dark: #114bb5;
      --good: #137a44;
      --warn: #9c6100;
      --bad: #a22323;
      --shadow: 0 14px 34px rgba(23, 49, 77, 0.09);
      --radius: 20px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }
    .app-shell {
      min-height: 100vh;
      padding: 20px 14px 28px;
      display: flex;
      justify-content: center;
    }
    .app {
      width: min(1140px, 100%);
      display: grid;
      gap: 16px;
    }
    .card {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 14px 34px rgba(23, 49, 77, 0.09);
    }
    .hero {
      padding: 28px;
      text-align: center;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }
    .hero p {
      margin: 0 auto 20px;
      max-width: 760px;
      font-size: 1.12rem;
      line-height: 1.55;
      color: var(--muted);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      padding: 10px 16px;
      background: #eef5ff;
      border: 2px solid #cfe0ff;
      color: var(--accent-dark);
      font-weight: 800;
      margin-bottom: 18px;
    }
    .button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      min-height: 54px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 800;
      transition: transform 0.12s ease, background 0.12s ease, opacity 0.12s ease;
    }
    .button:hover { transform: translateY(-1px); }
    .button:active { transform: translateY(0); }
    .button[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }
    .button.primary {
      background: var(--accent);
      color: white;
    }
    .button.primary:hover { background: var(--accent-dark); }
    .button.secondary {
      background: #eff5ff;
      color: var(--accent-dark);
      border: 2px solid #d0e0ff;
    }
    .button.ghost {
      background: #f8fbff;
      color: var(--ink);
      border: 2px solid #d7e4f6;
    }
    .main-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 16px;
      align-items: start;
    }
    .screen-card { padding: 22px; }
    .side-card {
      padding: 18px;
      position: sticky;
      top: 16px;
    }
    .top-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .label-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 14px;
      background: #eef5ff;
      border: 2px solid #d2e0ff;
      color: var(--accent-dark);
      font-weight: 800;
    }
    .progress {
      font-size: 0.98rem;
      color: var(--muted);
      font-weight: 800;
    }
    .prompt {
      font-size: clamp(1.2rem, 2vw, 1.55rem);
      font-weight: 900;
      margin: 0 0 18px;
    }
    .sentence-panel {
      border: 2px solid #d8e4f6;
      border-radius: 18px;
      background: #fbfdff;
      padding: 18px;
      font-size: clamp(1.24rem, 2.15vw, 1.62rem);
      line-height: 1.85;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .plain-token { white-space: pre-wrap; }
    .guess-wrap {
      display: inline-flex;
      vertical-align: middle;
      margin: 0 4px;
    }
    .guess-chip {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 150px;
      padding: 10px 10px 12px;
      border-radius: 16px;
      border: 2px solid #bfd1ff;
      background: #f3f7ff;
    }
    .guess-chip.future {
      background: #f8fbff;
      border-color: #d6e1f4;
    }
    .guess-chip.solved {
      background: #eefaf2;
      border-color: #bfe5ca;
    }
    .guess-chip.fail {
      background: #fff2f2;
      border-color: #f0c5c5;
      animation: pulse 0.9s infinite;
    }
    .clue {
      font-size: 1.06rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      color: var(--accent-dark);
      text-transform: lowercase;
      min-height: 1.2em;
    }
    .solved-word, .flash-word {
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 1.15rem;
      font-weight: 900;
    }
    .solved-word {
      color: var(--good);
      background: #e8f8ee;
    }
    .flash-word {
      color: var(--bad);
      background: #ffe2e2;
    }
    .guess-input {
      width: 180px;
      min-width: 120px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid #97b8f5;
      font-size: 1rem;
      font-weight: 800;
      text-align: center;
      color: var(--ink);
      background: #fff;
    }
    .guess-input:focus {
      outline: 3px solid rgba(42, 105, 240, 0.18);
      border-color: var(--accent);
    }
    .visual-panel {
      margin-top: 0;
      border: 0;
      border-radius: 0;
      background: linear-gradient(180deg, #fbfeff 0%, #f3f9ff 100%);
      padding: 0;
    }
    .visual-title {
      margin: 0 0 10px;
      font-size: 1.02rem;
      font-weight: 900;
      color: var(--accent-dark);
    }
    .visual-sub {
      margin: 0 0 12px;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .diagram-wrap {
      min-height: 188px;
      display: grid;
      place-items: center;
    }
    .exchange-scene {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .air-cloud {
      width: 140px;
      min-height: 116px;
      border-radius: 999px;
      background: linear-gradient(180deg, #f6fbff 0%, #eaf6ff 100%);
      border: 3px solid #cfe9ff;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-content: center;
      gap: 8px;
      padding: 18px 12px;
      position: relative;
      overflow: hidden;
    }
    .air-cloud::before,
    .air-cloud::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: linear-gradient(180deg, #f6fbff 0%, #eaf6ff 100%);
      border: 3px solid #cfe9ff;
      z-index: -1;
    }
    .air-cloud::before {
      width: 64px;
      height: 56px;
      top: -12px;
      left: 18px;
    }
    .air-cloud::after {
      width: 72px;
      height: 62px;
      top: -16px;
      right: 18px;
    }
    .gas-chip {
      min-width: 44px;
      height: 44px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 0.96rem;
      font-weight: 900;
      border: 2px solid #bfe0ff;
      background: white;
      color: #175286;
      animation: floaty 2.8s ease-in-out infinite;
    }
    .gas-chip.co2 {
      animation-delay: 0.7s;
      color: #7a2f2f;
      border-color: #f0c0c0;
      background: #fff7f7;
    }
    .body-figure {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
    }
    .head {
      width: 74px;
      height: 74px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 1.9rem;
      border: 3px solid #f0c28a;
      background: radial-gradient(circle at 32% 25%, #ffe7be 0%, #ffd89d 60%, #f0bc79 100%);
    }
    .torso {
      width: 118px;
      height: 128px;
      border-radius: 28px;
      background: linear-gradient(180deg, #8fd6ff 0%, #5cb8f2 100%);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .lung-pair {
      display: flex;
      gap: 8px;
      align-items: center;
      animation: breathe 2.2s ease-in-out infinite;
      transform-origin: center;
    }
    .lung {
      width: 34px;
      height: 54px;
      border-radius: 22px 22px 28px 28px;
      background: linear-gradient(180deg, #ff9cab 0%, #f26f86 100%);
      border: 2px solid #e96f86;
    }
    .windpipe-line {
      position: absolute;
      top: 16px;
      width: 10px;
      height: 74px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe9c5 0%, #ffc97a 100%);
      border: 2px solid #efb968;
    }
    .flow-column {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      min-width: 80px;
    }
    .arrow-pill {
      padding: 10px 12px;
      border-radius: 14px;
      font-weight: 900;
      color: white;
      background: linear-gradient(180deg, #4fb2ff 0%, #1c89dd 100%);
      font-size: 0.98rem;
      animation: pulseMove 1.8s ease-in-out infinite;
    }
    .arrow-pill.out {
      background: linear-gradient(180deg, #ff9da9 0%, #ed6277 100%);
      animation-delay: 0.8s;
    }
    .parts-scene {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .profile-card {
      width: 180px;
      height: 190px;
      border-radius: 24px;
      background: linear-gradient(180deg, #fef5e9 0%, #ffe6c5 100%);
      border: 3px solid #f0cf9f;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .profile-head {
      width: 116px;
      height: 136px;
      background: radial-gradient(circle at 38% 22%, #ffe8bf 0%, #ffd59a 64%, #f1bd7d 100%);
      clip-path: polygon(14% 8%, 70% 8%, 92% 20%, 92% 48%, 80% 58%, 76% 72%, 62% 88%, 18% 88%, 12% 62%, 8% 34%);
      border-radius: 30px;
      position: relative;
    }
    .nose-dot {
      position: absolute;
      right: 12px;
      top: 52px;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #ff9d7c;
      border: 2px solid #ea8663;
      animation: blinkAir 1.8s ease-in-out infinite;
    }
    .windpipe-path {
      position: absolute;
      top: 70px;
      left: 84px;
      width: 10px;
      height: 78px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe8c4 0%, #ffc979 100%);
      border: 2px solid #edba69;
    }
    .lungs-mini {
      position: absolute;
      bottom: 14px;
      left: 52px;
      display: flex;
      gap: 6px;
      animation: breathe 2.2s ease-in-out infinite;
    }
    .lungs-mini .mini-lung {
      width: 22px;
      height: 34px;
      border-radius: 16px 16px 18px 18px;
      background: linear-gradient(180deg, #ff9cab 0%, #f26f86 100%);
      border: 2px solid #e96f86;
    }
    .parts-labels {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 160px;
    }
    .part-label {
      padding: 12px 14px;
      border-radius: 14px;
      border: 2px solid #d7e4f6;
      background: white;
      font-weight: 900;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .part-badge {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #eef6ff;
      border: 2px solid #d3e3ff;
      color: var(--accent-dark);
      font-size: 0.95rem;
      font-weight: 900;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
    }
    .feedback {
      margin-top: 14px;
      min-height: 58px;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.5;
      border: 2px solid #dce6f7;
      background: #f7fbff;
    }
    .feedback.good {
      background: #eefaf2;
      border-color: #bfe5ca;
      color: var(--good);
    }
    .feedback.warn {
      background: #fff8ee;
      border-color: #f1d6ad;
      color: var(--warn);
    }
    .feedback.bad {
      background: #fff2f2;
      border-color: #f0c5c5;
      color: var(--bad);
    }
    .side-card h2 {
      margin: 0 0 12px;
      font-size: 1.18rem;
    }
    .mini {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.97rem;
      line-height: 1.45;
    }
    .tracker-frame {
      border: 2px solid #d8e4f6;
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(180deg, #fbfffd 0%, #f4fbff 100%);
    }
    .tracker-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .face-bubble {
      width: 84px;
      height: 84px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 2.15rem;
      border: 3px solid #d7e3f6;
      box-shadow: 0 8px 18px rgba(23, 50, 77, 0.08);
      background: linear-gradient(180deg, #f7fff9 0%, #edfff2 100%);
    }
    .face-bubble.worried { background: linear-gradient(180deg, #fff9ef 0%, #fff0d8 100%); }
    .face-bubble.angry { background: linear-gradient(180deg, #fff3f3 0%, #ffe0e0 100%); }
    .face-bubble.fail { background: linear-gradient(180deg, #f7f1ff 0%, #ece2ff 100%); }
    .face-caption {
      min-height: 1.3em;
      font-size: 0.97rem;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
    }
    .tracker-chip {
      min-width: 34px;
      min-height: 34px;
      padding: 4px 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      border: 2px solid #d5e2f6;
      background: #fff;
    }
    .tracker-chip.lost {
      opacity: 0.34;
      filter: grayscale(1);
    }
    .tracker-stats {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--muted);
    }
    .scene {
      min-height: 188px;
      display: grid;
      place-items: center;
      padding: 8px 6px;
    }
    .breath-scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }
    .person-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .person-head {
      width: 86px;
      height: 86px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 2.05rem;
      border: 3px solid #e2c089;
      background: radial-gradient(circle at 32% 25%, #ffe6b8 0%, #ffd397 60%, #efbd78 100%);
    }
    .person-body {
      width: 98px;
      height: 84px;
      border-radius: 20px;
      background: linear-gradient(180deg, #7bc3ff 0%, #4c8fe0 100%);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .person-body::before,
    .person-body::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 54px;
      background: #6ca8ff;
      top: 16px;
      border-radius: 999px;
    }
    .person-body::before { left: -10px; transform: rotate(18deg); }
    .person-body::after { right: -10px; transform: rotate(-18deg); }
    .chest-lungs {
      display: flex;
      gap: 6px;
      animation: breathe 2.2s ease-in-out infinite;
    }
    .chest-lungs .chest-lung {
      width: 18px;
      height: 30px;
      border-radius: 14px 14px 16px 16px;
      background: linear-gradient(180deg, #ff9cab 0%, #f26f86 100%);
      border: 2px solid #e96f86;
    }
    .breath-meter {
      width: 180px;
      height: 22px;
      border-radius: 999px;
      border: 2px solid #cfe2f8;
      background: #f5faff;
      overflow: hidden;
    }
    .breath-fill {
      height: 100%;
      background: linear-gradient(90deg, #79d1ff 0%, #3aaeff 100%);
      transition: width 0.2s ease;
    }
    .oxygen-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 4px;
    }
    .fail-box {
      min-height: 188px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--bad);
      font-weight: 900;
      line-height: 1.45;
      background: #fff4f4;
      border: 2px dashed #efc1c1;
      border-radius: 16px;
      padding: 12px;
    }
    details.visual-details {
      margin-top: 16px;
      border: 2px solid #d8e4f6;
      border-radius: 16px;
      overflow: hidden;
      background: #fbfdff;
    }

    details.visual-details summary {
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 900;
      user-select: none;
      list-style: none;
      color: var(--accent-dark);
      background: #f5f9ff;
    }

    details.visual-details summary::-webkit-details-marker {
      display: none;
    }

    .visual-details-body {
      border-top: 2px solid #e5edf9;
      padding: 14px;
    }

    details.help {
      margin-top: 18px;
      border: 2px solid #d8e4f6;
      border-radius: 16px;
      overflow: hidden;
      background: #fbfdff;
    }
    details.help summary {
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 800;
      user-select: none;
      list-style: none;
    }
    details.help summary::-webkit-details-marker { display: none; }
    .help-body {
      padding: 0 16px 16px;
      border-top: 2px solid #e5edf9;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.98rem;
    }
    .help-body p { margin: 12px 0 0; }
    .complete-list {
      margin: 18px auto 0;
      max-width: 760px;
      text-align: left;
      border: 2px solid #d8e4f6;
      border-radius: 18px;
      background: #fbfdff;
      padding: 16px 18px;
    }
    .complete-list h2 {
      margin: 0 0 10px;
      font-size: 1.15rem;
    }
    .complete-list ul {
      margin: 0;
      padding-left: 20px;
      line-height: 1.7;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }
    @keyframes breathe {
      0% { transform: scale(0.94); }
      50% { transform: scale(1.04); }
      100% { transform: scale(0.94); }
    }
    @keyframes floaty {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }
    @keyframes blinkAir {
      0% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.16); opacity: 1; }
      100% { transform: scale(1); opacity: 0.85; }
    }
    @keyframes pulseMove {
      0% { transform: translateX(0); }
      50% { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }
    @media (max-width: 920px) {
      .main-layout { grid-template-columns: 1fr; }
      .side-card { position: static; }
    }
    @media (max-width: 640px) {
      .app-shell { padding: 14px 10px 22px; }
      .hero, .screen-card, .side-card { padding: 18px; }
      .sentence-panel {
        font-size: 1.14rem;
        line-height: 1.74;
      }
      .guess-chip { min-width: 130px; }
      .guess-input { width: min(160px, 52vw); }
      .controls { align-items: stretch; }
      .button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="app" class="app" aria-live="polite"></div>
  </div>
  <script>
    const GAME_TITLE = "Respiratory System Guess-the-Word Game";
    const SOURCE_SCREENS = [{"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The respiratory system is involved in the exchange of gases between our body and our surroundings.", "targets": ["respiratory"], "demeritText": "The person runs out of breath more.", "failText": "The person faints.", "theme": "breath_meter", "visualType": "gas_exchange"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The respiratory system is involved in the exchange of gases between our body and our surroundings.", "targets": ["exchange"], "demeritText": "The person runs out of breath more.", "failText": "The person faints.", "theme": "breath_meter", "visualType": "gas_exchange"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The respiratory system is involved in the exchange of gases between our body and our surroundings.", "targets": ["gases"], "demeritText": "The person runs out of breath more.", "failText": "The person faints.", "theme": "breath_meter", "visualType": "gas_exchange"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The respiratory system is involved in the exchange of gases between our body and our surroundings.", "targets": ["surroundings"], "demeritText": "The person runs out of breath more.", "failText": "The person faints.", "theme": "breath_meter", "visualType": "gas_exchange"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Parts of the respiratory system include the nose, windpipe, and lungs.", "targets": ["respiratory"], "demeritText": "The person runs out of breath more.", "failText": "The person faints.", "theme": "breath_meter", "visualType": "parts_diagram"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Parts of the respiratory system include the nose, windpipe, and lungs.", "targets": ["nose"], "demeritText": "The person runs out of breath more.", "failText": "The person faints.", "theme": "breath_meter", "visualType": "parts_diagram"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Parts of the respiratory system include the nose, windpipe, and lungs.", "targets": ["windpipe"], "demeritText": "The person runs out of breath more.", "failText": "The person faints.", "theme": "breath_meter", "visualType": "parts_diagram"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Parts of the respiratory system include the nose, windpipe, and lungs.", "targets": ["lungs"], "demeritText": "The person runs out of breath more.", "failText": "The person faints.", "theme": "breath_meter", "visualType": "parts_diagram"}];
    const FLASH_DURATION_MS = 10000;

    const state = {
      view: "intro",
      screenIndex: 0,
      screens: [],
      currentInput: "",
      feedback: "",
      feedbackTone: "warn"
    };

    function normalizeWord(text) {
      return (text || "").toLowerCase().replace(/[^a-z0-9]/gi, "");
    }

    function tokenize(sentence) {
      return sentence.match(/(\s+|[A-Za-z']+|[^A-Za-z'\s]+)/g) || [];
    }

    function shuffleArray(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function prepareScreens(rawScreens) {
      return rawScreens.map((screen, idx) => {
        const tokens = tokenize(screen.sentence);
        const targetSet = new Set(screen.targets.map(t => normalizeWord(t)));
        const occurrences = [];

        tokens.forEach((token, tokenIndex) => {
          const normalized = normalizeWord(token);
          if (normalized && targetSet.has(normalized)) {
            occurrences.push({
              tokenIndex,
              originalToken: token,
              target: token,
              solved: false,
              fail: false,
              wrongAttempts: 0,
              revealedCount: 1,
              chanceLimit: Math.max(normalized.length - 2, 1)
            });
          }
        });

        return {
          ...screen,
          tokens,
          occurrences,
          orderLabel: idx + 1
        };
      });
    }

    function activeOccurrenceIndex(screen) {
      return screen.occurrences.findIndex(o => !o.solved);
    }

    function getActiveOccurrence(screen) {
      const index = activeOccurrenceIndex(screen);
      if (index === -1) return null;
      return { index, occurrence: screen.occurrences[index] };
    }

    function clueText(target, revealedCount) {
      const clean = target.replace(/[^A-Za-z0-9]/g, "");
      const shown = clean.slice(0, Math.max(1, revealedCount));
      const hidden = clean.slice(Math.max(1, revealedCount)).split("").map(() => "_").join(" ");
      return hidden ? `${shown} ${hidden}` : shown;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(text) {
      return escapeHtml(text).replace(/`/g, "&#96;");
    }

    function clearSpeech() {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    }

    function speakText(text) {
      if (!("speechSynthesis" in window)) return;
      clearSpeech();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.96;
      utterance.pitch = 1;
      window.speechSynthesis.speak(utterance);
    }

    function currentScreen() {
      return state.screens[state.screenIndex];
    }

    function screenSolved(screen) {
      return screen.occurrences.every(o => o.solved);
    }

    function sentenceForReadAloud(screen) {
      return screen.tokens.map((token, tokenIndex) => {
        const occIndex = screen.occurrences.findIndex(o => o.tokenIndex === tokenIndex);
        if (occIndex === -1) return token;
        const occ = screen.occurrences[occIndex];
        if (occ.solved || occ.fail) return occ.originalToken;
        return "blank";
      }).join("");
    }

    function updateFeedback(text, tone) {
      state.feedback = text;
      state.feedbackTone = tone;
    }

    function startGame() {
      const shuffled = shuffleArray(SOURCE_SCREENS);
      state.screens = prepareScreens(shuffled);
      state.view = "play";
      state.screenIndex = 0;
      state.currentInput = "";
      updateFeedback("Type the full missing word and tap Check.", "warn");
      render();
      focusActiveInput();
    }

    function restartAll() {
      clearSpeech();
      startGame();
    }

    function backToStart() {
      clearSpeech();
      state.view = "intro";
      state.screenIndex = 0;
      state.screens = [];
      state.currentInput = "";
      state.feedback = "";
      state.feedbackTone = "warn";
      render();
    }

    function focusActiveInput() {
      requestAnimationFrame(() => {
        const input = document.getElementById("activeGuessInput");
        if (input && !input.disabled) {
          input.focus();
          input.select();
        }
      });
    }

    function moveNext() {
      if (state.screenIndex < state.screens.length - 1) {
        state.screenIndex += 1;
        state.currentInput = "";
        updateFeedback("Type the full missing word and tap Check.", "warn");
        render();
        focusActiveInput();
      } else {
        state.view = "complete";
        render();
      }
    }

    function handleInputChange(value) {
      state.currentInput = value.replace(/\s+/g, "");
    }

    function resetFailedOccurrence(screen, occ) {
      occ.fail = false;
      occ.wrongAttempts = 0;
      occ.revealedCount = 1;
      state.currentInput = "";
      updateFeedback("That word has reset. Try again from the first clue.", "warn");
      render();
      focusActiveInput();
    }

    function checkGuess() {
      const screen = currentScreen();
      if (!screen) return;
      const active = getActiveOccurrence(screen);
      if (!active) return;

      const occ = active.occurrence;
      if (occ.fail) return;

      const guess = state.currentInput.trim();
      if (!guess) {
        updateFeedback("Type the full word first.", "warn");
        render();
        focusActiveInput();
        return;
      }

      if (normalizeWord(guess) === normalizeWord(occ.target)) {
        occ.solved = true;
        occ.fail = false;
        state.currentInput = "";
        updateFeedback(screenSolved(screen) ? "Correct. This sentence is complete." : "Correct. Now solve the next missing word.", "good");
        render();
        focusActiveInput();
        return;
      }

      occ.wrongAttempts += 1;
      occ.revealedCount = Math.min(normalizeWord(occ.target).length, occ.revealedCount + 1);

      if (occ.wrongAttempts >= occ.chanceLimit) {
        occ.fail = true;
        updateFeedback(screen.failText, "bad");
        render();
        window.setTimeout(() => {
          resetFailedOccurrence(screen, occ);
        }, FLASH_DURATION_MS);
        return;
      }

      updateFeedback(screen.demeritText + " One more letter is now shown.", "warn");
      render();
      focusActiveInput();
    }

    function buildSentenceMarkup(screen) {
      const active = getActiveOccurrence(screen);
      const activeIndex = active ? active.index : -1;

      return screen.tokens.map((token, tokenIndex) => {
        const occIndex = screen.occurrences.findIndex(o => o.tokenIndex === tokenIndex);
        if (occIndex === -1) {
          return `<span class="plain-token">${escapeHtml(token)}</span>`;
        }

        const occ = screen.occurrences[occIndex];

        if (occ.solved) {
          return `<span class="guess-wrap"><span class="guess-chip solved"><span class="solved-word">${escapeHtml(occ.originalToken)}</span></span></span>`;
        }

        if (occ.fail) {
          return `<span class="guess-wrap"><span class="guess-chip fail"><span class="flash-word">${escapeHtml(occ.originalToken)}</span></span></span>`;
        }

        if (occIndex === activeIndex) {
          const width = Math.max(120, normalizeWord(occ.target).length * 18 + 80);
          return `
            <span class="guess-wrap">
              <label class="guess-chip" aria-label="Missing word input">
                <span class="clue">${escapeHtml(clueText(occ.target, occ.revealedCount))}</span>
                <input
                  id="activeGuessInput"
                  class="guess-input"
                  type="text"
                  autocomplete="off"
                  autocapitalize="none"
                  spellcheck="false"
                  inputmode="text"
                  maxlength="${normalizeWord(occ.target).length + 2}"
                  placeholder="Type full word"
                  style="width:${width}px"
                  value="${escapeAttribute(state.currentInput)}"
                />
              </label>
            </span>
          `;
        }

        return `<span class="guess-wrap"><span class="guess-chip future"><span class="clue">${escapeHtml(clueText(occ.target, 1))}</span></span></span>`;
      }).join("");
    }

    function faceState(used, total, fail) {
      if (fail) return { cls: "fail", emoji: "😵", caption: "The person has fainted." };
      if (used === 0) return { cls: "", emoji: "🙂", caption: "The person can still breathe well." };
      const ratio = used / total;
      if (ratio < 0.5) return { cls: "worried", emoji: "😟", caption: "The person is getting short of breath." };
      return { cls: "angry", emoji: "😮‍💨", caption: "The person is almost out of breath." };
    }

    function renderPenaltyTracker(screen) {
      const active = getActiveOccurrence(screen);
      if (!active) {
        return `
          <div class="tracker-frame">
            <div class="scene">
              <div class="tracker-top">
                <div class="face-bubble">😄</div>
                <div class="face-caption">This screen is complete.</div>
              </div>
            </div>
          </div>
        `;
      }

      const occ = active.occurrence;
      const used = occ.wrongAttempts;
      const total = occ.chanceLimit;
      const left = Math.max(total - used, 0);
      const face = faceState(used, total, occ.fail);

      if (occ.fail) {
        return `
          <div class="tracker-frame">
            <div class="fail-box">
              <div class="tracker-top">
                <div class="face-bubble fail">😵</div>
                <div class="face-caption">${escapeHtml(face.caption)}</div>
              </div>
              <div class="person-wrap">
                <div class="person-head">😵</div>
                <div class="person-body">
                  <div class="chest-lungs">
                    <div class="chest-lung"></div>
                    <div class="chest-lung"></div>
                  </div>
                </div>
              </div>
              <div style="margin-top:8px;">${escapeHtml(screen.failText)}</div>
            </div>
          </div>
        `;
      }

      const breathIcons = Array.from({ length: total }, (_, i) => `<span class="tracker-chip ${i < used ? "lost" : ""}">${i < used ? "💨" : "🫧"}</span>`).join("");
      const fillPct = Math.max(10, 100 - (used / total) * 90);

      return `
        <div class="tracker-frame">
          <div class="oxygen-row">${breathIcons}</div>
          <div class="scene">
            <div class="breath-scene">
              <div class="tracker-top">
                <div class="face-bubble ${face.cls}">${face.emoji}</div>
                <div class="face-caption">${face.caption}</div>
              </div>
              <div class="person-wrap">
                <div class="person-head">${face.emoji}</div>
                <div class="person-body">
                  <div class="chest-lungs">
                    <div class="chest-lung"></div>
                    <div class="chest-lung"></div>
                  </div>
                </div>
              </div>
              <div class="breath-meter"><div class="breath-fill" style="width:${fillPct}%;"></div></div>
            </div>
          </div>
          <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Breath left: ${left}</span></div>
        </div>
      `;
    }

    function renderGasExchangeVisual() {
      return `
        <div class="visual-panel">
          <p class="visual-title">Visual clue</p>
          <p class="visual-sub">Watch the arrows. Air moves between the body and the surroundings.</p>
          <div class="diagram-wrap">
            <div class="exchange-scene">
              <div class="air-cloud" aria-hidden="true">
                <div class="gas-chip">O₂</div>
                <div class="gas-chip">O₂</div>
                <div class="gas-chip co2">CO₂</div>
              </div>
              <div class="flow-column" aria-hidden="true">
                <div class="arrow-pill">O₂ → body</div>
                <div class="arrow-pill out">CO₂ → out</div>
              </div>
              <div class="body-figure" aria-hidden="true">
                <div class="head">🙂</div>
                <div class="torso">
                  <div class="windpipe-line"></div>
                  <div class="lung-pair">
                    <div class="lung"></div>
                    <div class="lung"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderPartsVisual() {
      return `
        <div class="visual-panel">
          <p class="visual-title">Visual clue</p>
          <p class="visual-sub">Air enters through the nose, moves down the windpipe, and reaches the lungs.</p>
          <div class="diagram-wrap">
            <div class="parts-scene">
              <div class="profile-card" aria-hidden="true">
                <div class="profile-head">
                  <div class="nose-dot"></div>
                  <div class="windpipe-path"></div>
                  <div class="lungs-mini">
                    <div class="mini-lung"></div>
                    <div class="mini-lung"></div>
                  </div>
                </div>
              </div>
              <div class="parts-labels">
                <div class="part-label"><span class="part-badge">1</span> Nose</div>
                <div class="part-label"><span class="part-badge">2</span> Windpipe</div>
                <div class="part-label"><span class="part-badge">3</span> Lungs</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function visualMarkup(screen) {
      const visualContent = screen.visualType === "gas_exchange"
        ? renderGasExchangeVisual()
        : renderPartsVisual();

      return `
        <details class="visual-details">
          <summary>Show visual clue</summary>
          <div class="visual-details-body">
            ${visualContent}
          </div>
        </details>
      `;
    }

    function renderIntro() {
      return `
        <section class="card hero">
          <div class="badge">🫁 Guess the missing science word</div>
          <h1>${escapeHtml(GAME_TITLE)}</h1>
          <p>
            Each time you start, the screens appear in a random order.
            Type the full missing word inside the sentence, use the visual clue to understand the idea, and watch the breathing tracker change expression as wrong tries build up.
          </p>
          <button class="button primary" id="startBtn">Start game</button>
        </section>
      `;
    }

    function renderPlay() {
      const screen = currentScreen();
      const active = getActiveOccurrence(screen);
      const complete = screenSolved(screen);

      return `
        <div class="main-layout">
          <section class="card screen-card">
            <div class="top-row">
              <div class="label-pill">${escapeHtml(screen.label)}</div>
              <div class="progress">Screen ${state.screenIndex + 1} of ${state.screens.length}</div>
            </div>

            <p class="prompt">${escapeHtml(screen.prompt)}</p>

            <div class="sentence-panel">${buildSentenceMarkup(screen)}</div>

            ${visualMarkup(screen)}

            <div class="controls">
              <button class="button primary" id="checkBtn" ${active && active.occurrence.fail ? "disabled" : ""}>Check</button>
              <button class="button secondary" id="readBtn">🔊 Read aloud</button>
              <button class="button ghost" id="nextBtn" ${complete ? "" : "disabled"}>Next screen</button>
            </div>

            <div class="feedback ${state.feedbackTone}">${escapeHtml(state.feedback)}</div>

            <details class="help">
              <summary>How to play</summary>
              <div class="help-body">
                <p>Type the full missing word.</p>
                <p>The first letter is shown first. A wrong non-blank answer reveals one more letter.</p>
                <p>If all chances for the current word are used up, only that word flashes, then only that word resets.</p>
                <p>Restarting the game randomizes the screen order again.</p>
              </div>
            </details>
          </section>

          <aside class="card side-card">
            <h2>Breathing tracker</h2>
            <p class="mini">${escapeHtml(screen.demeritText)}</p>
            ${renderPenaltyTracker(screen)}
            <p class="mini" style="margin-top:12px;">The tracker resets for the next word.</p>
          </aside>
        </div>
      `;
    }

    function renderComplete() {
      const items = state.screens.map((s, i) => `<li>Screen ${i + 1}: ${escapeHtml(s.sentence)}</li>`).join("");
      return `
        <section class="card hero">
          <div class="badge">✅ Game complete</div>
          <h1>${escapeHtml(GAME_TITLE)}</h1>
          <p>You completed all the sentence screens in a randomized order.</p>
          <div class="complete-list">
            <h2>Completed screens</h2>
            <ul>${items}</ul>
          </div>
          <div class="controls" style="justify-content:center; margin-top:20px;">
            <button class="button primary" id="restartBtn">Restart all</button>
            <button class="button secondary" id="homeBtn">Return to start</button>
          </div>
        </section>
      `;
    }

    function render() {
      const app = document.getElementById("app");
      if (!app) return;
      if (state.view === "intro") app.innerHTML = renderIntro();
      else if (state.view === "play") app.innerHTML = renderPlay();
      else app.innerHTML = renderComplete();
      bindEvents();
    }

    function bindEvents() {
      const startBtn = document.getElementById("startBtn");
      if (startBtn) startBtn.addEventListener("click", startGame);

      const restartBtn = document.getElementById("restartBtn");
      if (restartBtn) restartBtn.addEventListener("click", restartAll);

      const homeBtn = document.getElementById("homeBtn");
      if (homeBtn) homeBtn.addEventListener("click", backToStart);

      const checkBtn = document.getElementById("checkBtn");
      if (checkBtn) checkBtn.addEventListener("click", checkGuess);

      const nextBtn = document.getElementById("nextBtn");
      if (nextBtn) nextBtn.addEventListener("click", moveNext);

      const readBtn = document.getElementById("readBtn");
      if (readBtn) {
        readBtn.addEventListener("click", () => {
          if (state.view === "play") {
            const screen = currentScreen();
            const visualText = screen.visualType === "gas_exchange"
              ? "Air moves between the body and the surroundings."
              : "Air enters through the nose, moves down the windpipe, and reaches the lungs.";
            speakText([GAME_TITLE, screen.label, screen.prompt, sentenceForReadAloud(screen), visualText, state.feedback].filter(Boolean).join(". "));
          } else if (state.view === "intro") {
            speakText(`${GAME_TITLE}. Read each sentence and type the missing science word.`);
          } else {
            speakText(`${GAME_TITLE}. You completed all screens.`);
          }
        });
      }

      const input = document.getElementById("activeGuessInput");
      if (input) {
        input.addEventListener("input", (e) => {
          handleInputChange(e.target.value);
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            checkGuess();
          }
        });
      }
    }

    render();
  </script>
</body>
</html>

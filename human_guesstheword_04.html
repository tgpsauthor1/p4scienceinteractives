<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Digestive System Guess-the-Word Game</title>
<style>
:root{
  --bg1:#f8fbff; --bg2:#eef5ff; --panel:#ffffff; --ink:#17314d; --muted:#5b738f; --line:#d8e4f6;
  --accent:#2a69f0; --accent-dark:#114bb5; --good:#137a44; --warn:#9c6100; --bad:#a22323;
  --food:#ffb35c; --food-dark:#ef8f2a; --gut:#ff9cad; --gut-dark:#ef6f86; --skin:#ffd79d; --shirt:#78b7ff;
  --shadow:0 14px 34px rgba(23,49,77,.09); --radius:20px;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 100%)}
.app-shell{min-height:100vh;padding:20px 14px 28px;display:flex;justify-content:center}
.app{width:min(1160px,100%);display:grid;gap:16px}
.card{background:var(--panel);border:2px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.hero{padding:28px;text-align:center}
.hero h1{margin:0 0 10px;font-size:clamp(2rem,4vw,3rem);line-height:1.1}
.hero p{margin:0 auto 20px;max-width:780px;font-size:1.12rem;line-height:1.55;color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:10px;border-radius:999px;padding:10px 16px;background:#eef5ff;border:2px solid #cfe0ff;color:var(--accent-dark);font-weight:800;margin-bottom:18px}

.button{appearance:none;border:0;border-radius:14px;cursor:pointer;min-height:54px;padding:14px 18px;font-size:1rem;font-weight:800;transition:transform .12s ease,background .12s ease,opacity .12s ease}
.button:hover{transform:translateY(-1px)} .button:active{transform:translateY(0)}
.button[disabled]{opacity:.55;cursor:not-allowed;transform:none}
.button.primary{background:var(--accent);color:white}.button.primary:hover{background:var(--accent-dark)}
.button.secondary{background:#eff5ff;color:var(--accent-dark);border:2px solid #d0e0ff}
.button.ghost{background:#f8fbff;color:var(--ink);border:2px solid #d7e4f6}

.main-layout{display:grid;grid-template-columns:minmax(0,1fr) 350px;gap:16px;align-items:start}
.screen-card{padding:22px}
.side-card{padding:18px;position:sticky;top:16px}
.top-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:space-between;align-items:center;margin-bottom:16px}
.label-pill{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 14px;background:#eef5ff;border:2px solid #d2e0ff;color:var(--accent-dark);font-weight:800}
.progress{font-size:.98rem;color:var(--muted);font-weight:800}
.prompt{font-size:clamp(1.2rem,2vw,1.55rem);font-weight:900;margin:0 0 18px}
.sentence-panel{border:2px solid #d8e4f6;border-radius:18px;background:#fbfdff;padding:18px;font-size:clamp(1.2rem,2.05vw,1.52rem);line-height:1.82;white-space:pre-wrap;word-break:break-word}
.plain-token{white-space:pre-wrap}
.guess-wrap{display:inline-flex;vertical-align:middle;margin:0 4px}
.guess-chip{display:inline-flex;flex-direction:column;align-items:center;gap:8px;min-width:150px;padding:10px 10px 12px;border-radius:16px;border:2px solid #bfd1ff;background:#f3f7ff}
.guess-chip.future{background:#f8fbff;border-color:#d6e1f4}
.guess-chip.solved{background:#eefaf2;border-color:#bfe5ca}
.guess-chip.fail{background:#fff2f2;border-color:#f0c5c5;animation:pulse .9s infinite}
.clue{font-size:1.06rem;font-weight:900;letter-spacing:.16em;color:var(--accent-dark);text-transform:lowercase;min-height:1.2em}
.solved-word,.flash-word{padding:4px 10px;border-radius:10px;font-size:1.15rem;font-weight:900}
.solved-word{color:var(--good);background:#e8f8ee}
.flash-word{color:var(--bad);background:#ffe2e2}
.guess-input{width:180px;min-width:120px;padding:12px 14px;border-radius:12px;border:2px solid #97b8f5;font-size:1rem;font-weight:800;text-align:center;color:var(--ink);background:#fff}
.guess-input:focus{outline:3px solid rgba(42,105,240,.18);border-color:var(--accent)}

details.visual-details{margin-top:16px;border:2px solid #d8e4f6;border-radius:16px;overflow:hidden;background:#fbfdff}
details.visual-details summary{cursor:pointer;padding:14px 16px;font-weight:900;user-select:none;list-style:none;color:var(--accent-dark);background:#f5f9ff}
details.visual-details summary::-webkit-details-marker{display:none}
.visual-details-body{border-top:2px solid #e5edf9;padding:14px}
.visual-panel{background:linear-gradient(180deg,#fbfeff 0%,#f3f9ff 100%)}
.visual-title{margin:0 0 10px;font-size:1.02rem;font-weight:900;color:var(--accent-dark)}
.visual-sub{margin:0 0 12px;font-size:.95rem;color:var(--muted);line-height:1.45}
.diagram-wrap{min-height:194px;display:grid;place-items:center}
.breakdown-scene,.digested-scene,.path-scene{width:100%;display:flex;justify-content:center;align-items:center;gap:18px;flex-wrap:wrap}

.food-card{width:150px;height:156px;border-radius:24px;background:linear-gradient(180deg,#fff8ee 0%,#ffe8c9 100%);border:3px solid #efd3a5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.plate{width:96px;height:96px;border-radius:999px;background:linear-gradient(180deg,#ffffff 0%,#eef5ff 100%);border:3px solid #d9e4f6;display:grid;place-items:center;font-size:2rem}
.crumb-box{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center;width:144px;min-height:90px;padding:8px 10px;border-radius:20px;background:linear-gradient(180deg,#fff7f0 0%,#ffe8d2 100%);border:3px solid #f0d4b3}
.crumb{width:18px;height:18px;border-radius:999px;background:linear-gradient(180deg,var(--food) 0%,var(--food-dark) 100%);animation:floaty 1.6s ease-in-out infinite}
.crumb:nth-child(2){animation-delay:.2s}.crumb:nth-child(3){animation-delay:.4s}.crumb:nth-child(4){animation-delay:.6s}.crumb:nth-child(5){animation-delay:.8s}.crumb:nth-child(6){animation-delay:1s}
.flow-pill{padding:12px 14px;border-radius:16px;background:white;border:2px solid #d7e4f6;font-weight:900;color:var(--accent-dark);animation:wiggle 1.6s ease-in-out infinite}
.body-card{width:152px;height:188px;border-radius:26px;background:linear-gradient(180deg,#fff7ee 0%,#ffe7c9 100%);border:3px solid #efd3a5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.person-head{width:60px;height:60px;border-radius:999px;background:radial-gradient(circle at 32% 25%,#ffe6b8 0%,#ffd397 60%,#efbd78 100%);border:3px solid #efc18a;display:grid;place-items:center;font-size:1.2rem}
.person-body{width:92px;height:96px;border-radius:28px;background:linear-gradient(180deg,#9fd6ff 0%,#71baf1 100%);position:relative;display:grid;place-items:center}
.person-body::before,.person-body::after{content:"";position:absolute;width:16px;height:64px;background:#84c6f8;border-radius:999px;top:10px}
.person-body::before{left:-10px;transform:rotate(12deg)} .person-body::after{right:-10px;transform:rotate(-12deg)}
.energy-particles{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;width:64px}
.energy-dot{width:14px;height:14px;border-radius:999px;background:linear-gradient(180deg,#7ad17e 0%,#3eae54 100%);animation:blink 1.2s ease-in-out infinite}
.energy-dot:nth-child(2){animation-delay:.2s}.energy-dot:nth-child(3){animation-delay:.4s}.energy-dot:nth-child(4){animation-delay:.6s}

.digested-label{padding:12px 14px;border-radius:16px;background:white;border:2px solid #d7e4f6;font-weight:900;text-align:center}
.bowl{width:120px;height:78px;border-radius:0 0 30px 30px;background:linear-gradient(180deg,#ffddb0 0%,#f2b96d 100%);border:3px solid #d79c51;display:grid;place-items:center;font-size:1.7rem;position:relative}
.bowl::before{content:"";position:absolute;left:-8px;right:-8px;top:-10px;height:18px;border-radius:999px;background:linear-gradient(180deg,#ffe6c0 0%,#f4c57f 100%);border:3px solid #d79c51}

.path-board{width:min(720px,100%);padding:14px;border-radius:22px;background:linear-gradient(180deg,#fffaf3 0%,#f6ece0 100%);border:3px solid #e1cfb8}
.path-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center}
.path-stop{padding:12px 14px;border-radius:16px;background:white;border:2px solid #d7e4f6;font-weight:900;position:relative;min-width:92px;text-align:center}
.path-stop.mouth{background:#fff2f2}
.path-stop.gullet{background:#fff8ee}
.path-stop.stomach{background:#ffeef4}
.path-stop.small{background:#eef9ef}
.path-stop.large{background:#eef5ff}
.path-stop.anus{background:#f5f0ff}
.path-arrow{font-weight:900;color:var(--accent-dark);font-size:1.15rem;animation:wiggle 1.8s ease-in-out infinite}
.food-dot-move{width:16px;height:16px;border-radius:999px;background:linear-gradient(180deg,var(--food) 0%,var(--food-dark) 100%);margin:12px auto 0;animation:floaty 1.6s ease-in-out infinite}

.controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:16px}
.feedback{margin-top:14px;min-height:58px;border-radius:14px;padding:14px 16px;font-size:1rem;font-weight:800;line-height:1.5;border:2px solid #dce6f7;background:#f7fbff}
.feedback.good{background:#eefaf2;border-color:#bfe5ca;color:var(--good)}
.feedback.warn{background:#fff8ee;border-color:#f1d6ad;color:var(--warn)}
.feedback.bad{background:#fff2f2;border-color:#f0c5c5;color:var(--bad)}

.side-card h2{margin:0 0 12px;font-size:1.18rem}
.mini{margin:0 0 12px;color:var(--muted);font-size:.97rem;line-height:1.45}
.tracker-frame{border:2px solid #d8e4f6;border-radius:18px;padding:16px;background:linear-gradient(180deg,#fbfffd 0%,#f4fbff 100%)}
.tracker-top{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:10px}
.face-bubble{width:84px;height:84px;border-radius:999px;display:grid;place-items:center;font-size:2.15rem;border:3px solid #d7e3f6;box-shadow:0 8px 18px rgba(23,50,77,.08);background:linear-gradient(180deg,#f7fff9 0%,#edfff2 100%)}
.face-bubble.worried{background:linear-gradient(180deg,#fff9ef 0%,#fff0d8 100%)} .face-bubble.angry{background:linear-gradient(180deg,#fff3f3 0%,#ffe0e0 100%)} .face-bubble.fail{background:linear-gradient(180deg,#f7f1ff 0%,#ece2ff 100%)}
.face-caption{min-height:1.3em;font-size:.97rem;font-weight:800;color:var(--muted);text-align:center}
.tracker-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px}
.tracker-chip{min-width:34px;min-height:34px;padding:4px 8px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-size:1.2rem;border:2px solid #d5e2f6;background:#fff}
.tracker-chip.lost{opacity:.34;filter:grayscale(1)}
.tracker-stats{display:flex;justify-content:space-between;gap:12px;margin-top:8px;font-size:.95rem;font-weight:800;color:var(--muted)}
.scene{min-height:194px;display:grid;place-items:center;padding:8px 6px}
.monkey-scene{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
.picnic-card{width:190px;height:180px;border-radius:24px;background:linear-gradient(180deg,#fff8ef 0%,#ffe8c9 100%);border:3px solid #efd3a5;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:10px}
.player-head{width:56px;height:56px;border-radius:999px;background:radial-gradient(circle at 32% 25%,#ffe6b8 0%,#ffd397 60%,#efbd78 100%);border:3px solid #efc18a;display:grid;place-items:center;font-size:1.15rem}
.player-body{width:72px;height:64px;border-radius:22px;background:linear-gradient(180deg,#9fd6ff 0%,#69b4ef 100%);margin-top:6px}
.picnic-plate{position:absolute;bottom:18px;width:110px;height:50px;border-radius:999px;background:linear-gradient(180deg,#ffffff 0%,#eef4ff 100%);border:3px solid #d8e4f6;display:flex;align-items:center;justify-content:center;gap:6px}
.food-piece{width:16px;height:16px;border-radius:999px;background:linear-gradient(180deg,var(--food) 0%,var(--food-dark) 100%)}
.monkey-pack{position:absolute;right:8px;top:18px;display:flex;flex-direction:column;gap:6px}
.monkey{font-size:1.45rem;animation:wiggle 1.2s ease-in-out infinite}
.monkey:nth-child(2){animation-delay:.2s}.monkey:nth-child(3){animation-delay:.4s}.monkey:nth-child(4){animation-delay:.6s}
.fail-box{min-height:194px;display:grid;place-items:center;text-align:center;color:var(--bad);font-weight:900;line-height:1.45;background:#fff4f4;border:2px dashed #efc1c1;border-radius:16px;padding:12px}
.laugh-row{display:flex;gap:12px;align-items:center;justify-content:center}
.laugh-monkey{font-size:2rem;animation:wiggle 1s ease-in-out infinite}

details.help{margin-top:18px;border:2px solid #d8e4f6;border-radius:16px;overflow:hidden;background:#fbfdff}
details.help summary{cursor:pointer;padding:14px 16px;font-weight:800;user-select:none;list-style:none}
details.help summary::-webkit-details-marker{display:none}
.help-body{padding:0 16px 16px;border-top:2px solid #e5edf9;color:var(--muted);line-height:1.6;font-size:.98rem}
.help-body p{margin:12px 0 0}
.complete-list{margin:18px auto 0;max-width:760px;text-align:left;border:2px solid #d8e4f6;border-radius:18px;background:#fbfdff;padding:16px 18px}
.complete-list h2{margin:0 0 10px;font-size:1.15rem}
.complete-list ul{margin:0;padding-left:20px;line-height:1.7}

@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes floaty{0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)}}
@keyframes wiggle{0%{transform:translateX(0)}50%{transform:translateX(4px)}100%{transform:translateX(0)}}
@keyframes blink{0%{opacity:.35}50%{opacity:1}100%{opacity:.35}}

@media (max-width:920px){.main-layout{grid-template-columns:1fr}.side-card{position:static}}
@media (max-width:640px){
  .app-shell{padding:14px 10px 22px}
  .hero,.screen-card,.side-card{padding:18px}
  .sentence-panel{font-size:1.12rem;line-height:1.74}
  .guess-chip{min-width:130px}
  .guess-input{width:min(160px,52vw)}
  .controls{align-items:stretch}
  .button{width:100%}
}
</style>
</head>
<body>
<div class="app-shell">
  <div id="app" class="app" aria-live="polite"></div>
</div>
<script>
const GAME_TITLE = "Digestive System Guess-the-Word Game";
const SOURCE_SCREENS = [{"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The digestive system breaks food down into simpler substances so that they could be used by our body.", "targets": ["digestive", "system"], "demeritText": "More of my food gets stolen by monkeys.", "failText": "The monkeys laugh at me.", "visualType": "breakdown"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The digestive system breaks food down into simpler substances so that they could be used by our body.", "targets": ["breaks"], "demeritText": "More of my food gets stolen by monkeys.", "failText": "The monkeys laugh at me.", "visualType": "breakdown"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The digestive system breaks food down into simpler substances so that they could be used by our body.", "targets": ["simpler", "substances"], "demeritText": "More of my food gets stolen by monkeys.", "failText": "The monkeys laugh at me.", "visualType": "breakdown"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The digestive system breaks food down into simpler substances so that they could be used by our body.", "targets": ["used", "body"], "demeritText": "More of my food gets stolen by monkeys.", "failText": "The monkeys laugh at me.", "visualType": "breakdown"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Food that has been broken down by our body into simpler substances is known as digested food.", "targets": ["simpler", "substances"], "demeritText": "More of my food gets stolen by monkeys.", "failText": "The monkeys laugh at me.", "visualType": "digested_food"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Food that has been broken down by our body into simpler substances is known as digested food.", "targets": ["digested", "food"], "demeritText": "More of my food gets stolen by monkeys.", "failText": "The monkeys laugh at me.", "visualType": "digested_food"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The food that you eat goes through your mouth, then your gullet, then your stomach, followed by your small intestine, then large intestine before exiting through your anus.", "targets": ["mouth"], "demeritText": "More of my food gets stolen by monkeys.", "failText": "The monkeys laugh at me.", "visualType": "digestive_path"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The food that you eat goes through your mouth, then your gullet, then your stomach, followed by your small intestine, then large intestine before exiting through your anus.", "targets": ["gullet"], "demeritText": "More of my food gets stolen by monkeys.", "failText": "The monkeys laugh at me.", "visualType": "digestive_path"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The food that you eat goes through your mouth, then your gullet, then your stomach, followed by your small intestine, then large intestine before exiting through your anus.", "targets": ["stomach"], "demeritText": "More of my food gets stolen by monkeys.", "failText": "The monkeys laugh at me.", "visualType": "digestive_path"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The food that you eat goes through your mouth, then your gullet, then your stomach, followed by your small intestine, then large intestine before exiting through your anus.", "targets": ["small", "large", "intestine"], "demeritText": "More of my food gets stolen by monkeys.", "failText": "The monkeys laugh at me.", "visualType": "digestive_path"}];
const FLASH_DURATION_MS = 10000;
const state = {view:"intro", screenIndex:0, screens:[], currentInput:"", feedback:"", feedbackTone:"warn"};

function normalizeWord(text){ return (text || "").toLowerCase().replace(/[^a-z0-9]/gi,""); }
function tokenize(sentence){ return sentence.match(/(\s+|[A-Za-z']+|[^A-Za-z'\s]+)/g) || []; }
function shuffleArray(items){
  const arr = [...items];
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}
function prepareScreens(rawScreens){
  return rawScreens.map((screen, idx) => {
    const tokens = tokenize(screen.sentence);
    const targetSet = new Set(screen.targets.map(t => normalizeWord(t)));
    const occurrences = [];
    tokens.forEach((token, tokenIndex) => {
      const normalized = normalizeWord(token);
      if(normalized && targetSet.has(normalized)){
        occurrences.push({tokenIndex, originalToken:token, target:token, solved:false, fail:false, wrongAttempts:0, revealedCount:1, chanceLimit:Math.max(normalized.length-2,1)});
      }
    });
    return {...screen, tokens, occurrences, orderLabel: idx+1};
  });
}
function activeOccurrenceIndex(screen){ return screen.occurrences.findIndex(o => !o.solved); }
function getActiveOccurrence(screen){
  const index = activeOccurrenceIndex(screen);
  if(index === -1) return null;
  return {index, occurrence: screen.occurrences[index]};
}
function clueText(target, revealedCount){
  const clean = target.replace(/[^A-Za-z0-9]/g,"");
  const shown = clean.slice(0, Math.max(1, revealedCount));
  const hidden = clean.slice(Math.max(1, revealedCount)).split("").map(() => "_").join(" ");
  return hidden ? `${shown} ${hidden}` : shown;
}
function escapeHtml(text){ return String(text).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function escapeAttribute(text){ return escapeHtml(text).replace(/`/g,"&#96;"); }
function clearSpeech(){ if("speechSynthesis" in window) window.speechSynthesis.cancel(); }
function speakText(text){
  if(!("speechSynthesis" in window)) return;
  clearSpeech();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.96; utterance.pitch = 1;
  window.speechSynthesis.speak(utterance);
}
function currentScreen(){ return state.screens[state.screenIndex]; }
function screenSolved(screen){ return screen.occurrences.every(o => o.solved); }
function sentenceForReadAloud(screen){
  return screen.tokens.map((token, tokenIndex) => {
    const occIndex = screen.occurrences.findIndex(o => o.tokenIndex === tokenIndex);
    if(occIndex === -1) return token;
    const occ = screen.occurrences[occIndex];
    if(occ.solved || occ.fail) return occ.originalToken;
    return "blank";
  }).join("");
}
function updateFeedback(text, tone){ state.feedback = text; state.feedbackTone = tone; }
function startGame(){
  state.screens = prepareScreens(shuffleArray(SOURCE_SCREENS));
  state.view = "play"; state.screenIndex = 0; state.currentInput = "";
  updateFeedback("Type the full missing word and tap Check.","warn");
  render(); focusActiveInput();
}
function restartAll(){ clearSpeech(); startGame(); }
function backToStart(){ clearSpeech(); state.view="intro"; state.screenIndex=0; state.screens=[]; state.currentInput=""; state.feedback=""; state.feedbackTone="warn"; render(); }
function focusActiveInput(){
  requestAnimationFrame(() => {
    const input = document.getElementById("activeGuessInput");
    if(input && !input.disabled){ input.focus(); input.select(); }
  });
}
function moveNext(){
  if(state.screenIndex < state.screens.length - 1){
    state.screenIndex += 1; state.currentInput = "";
    updateFeedback("Type the full missing word and tap Check.","warn");
    render(); focusActiveInput();
  } else { state.view = "complete"; render(); }
}
function handleInputChange(value){ state.currentInput = value.replace(/\s+/g,""); }
function resetFailedOccurrence(screen, occ){
  occ.fail = false; occ.wrongAttempts = 0; occ.revealedCount = 1; state.currentInput = "";
  updateFeedback("That word has reset. Try again from the first clue.","warn");
  render(); focusActiveInput();
}
function checkGuess(){
  const screen = currentScreen(); if(!screen) return;
  const active = getActiveOccurrence(screen); if(!active) return;
  const occ = active.occurrence; if(occ.fail) return;
  const guess = state.currentInput.trim();
  if(!guess){ updateFeedback("Type the full word first.","warn"); render(); focusActiveInput(); return; }
  if(normalizeWord(guess) === normalizeWord(occ.target)){
    occ.solved = true; occ.fail = false; state.currentInput = "";
    updateFeedback(screenSolved(screen) ? "Correct. This sentence is complete." : "Correct. Now solve the next missing word.","good");
    render(); focusActiveInput(); return;
  }
  occ.wrongAttempts += 1;
  occ.revealedCount = Math.min(normalizeWord(occ.target).length, occ.revealedCount + 1);
  if(occ.wrongAttempts >= occ.chanceLimit){
    occ.fail = true; updateFeedback(screen.failText,"bad"); render();
    window.setTimeout(() => { resetFailedOccurrence(screen, occ); }, FLASH_DURATION_MS);
    return;
  }
  updateFeedback(screen.demeritText + " One more letter is now shown.","warn");
  render(); focusActiveInput();
}
function buildSentenceMarkup(screen){
  const active = getActiveOccurrence(screen);
  const activeIndex = active ? active.index : -1;
  return screen.tokens.map((token, tokenIndex) => {
    const occIndex = screen.occurrences.findIndex(o => o.tokenIndex === tokenIndex);
    if(occIndex === -1) return `<span class="plain-token">${escapeHtml(token)}</span>`;
    const occ = screen.occurrences[occIndex];
    if(occ.solved) return `<span class="guess-wrap"><span class="guess-chip solved"><span class="solved-word">${escapeHtml(occ.originalToken)}</span></span></span>`;
    if(occ.fail) return `<span class="guess-wrap"><span class="guess-chip fail"><span class="flash-word">${escapeHtml(occ.originalToken)}</span></span></span>`;
    if(occIndex === activeIndex){
      const width = Math.max(120, normalizeWord(occ.target).length * 18 + 80);
      return `<span class="guess-wrap"><label class="guess-chip" aria-label="Missing word input"><span class="clue">${escapeHtml(clueText(occ.target, occ.revealedCount))}</span><input id="activeGuessInput" class="guess-input" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" inputmode="text" maxlength="${normalizeWord(occ.target).length + 2}" placeholder="Type full word" style="width:${width}px" value="${escapeAttribute(state.currentInput)}" /></label></span>`;
    }
    return `<span class="guess-wrap"><span class="guess-chip future"><span class="clue">${escapeHtml(clueText(occ.target, 1))}</span></span></span>`;
  }).join("");
}
function faceState(used, total, fail){
  if(fail) return {cls:"fail", emoji:"😭", caption:"The monkeys are laughing now."};
  if(used === 0) return {cls:"", emoji:"🙂", caption:"My food is still safe for now."};
  const ratio = used / total;
  if(ratio < 0.5) return {cls:"worried", emoji:"😟", caption:"More monkeys are taking the food."};
  return {cls:"angry", emoji:"😫", caption:"Almost all the food is gone."};
}
function renderPenaltyTracker(screen){
  const active = getActiveOccurrence(screen);
  if(!active){
    return `<div class="tracker-frame"><div class="scene"><div class="tracker-top"><div class="face-bubble">😄</div><div class="face-caption">This screen is complete.</div></div></div></div>`;
  }
  const occ = active.occurrence;
  const used = occ.wrongAttempts, total = occ.chanceLimit, left = Math.max(total-used,0), face = faceState(used, total, occ.fail);

  if(occ.fail){
    return `<div class="tracker-frame"><div class="fail-box"><div class="tracker-top"><div class="face-bubble fail">😭</div><div class="face-caption">${escapeHtml(face.caption)}</div></div><div class="laugh-row"><div class="laugh-monkey">🐒</div><div class="laugh-monkey">😂</div><div class="laugh-monkey">🐒</div></div><div style="margin-top:8px;">${escapeHtml(screen.failText)}</div></div></div>`;
  }

  const chips = Array.from({length: total}, (_, i) => `<span class="tracker-chip ${i < used ? "lost" : ""}">${i < used ? "🐒" : "🍱"}</span>`).join("");
  const monkeyCount = Math.min(used + 1, 4);
  const foodLeft = Math.max(1, 5 - used);

  let foodPieces = "";
  for(let i=0;i<foodLeft;i++){ foodPieces += `<div class="food-piece"></div>`; }

  let monkeys = "";
  for(let i=0;i<monkeyCount;i++){ monkeys += `<div class="monkey">🐒</div>`; }

  return `<div class="tracker-frame"><div class="tracker-row">${chips}</div><div class="scene"><div class="monkey-scene"><div class="tracker-top"><div class="face-bubble ${face.cls}">${face.emoji}</div><div class="face-caption">${face.caption}</div></div><div class="picnic-card"><div class="player-head">${face.emoji}</div><div class="player-body"></div><div class="monkey-pack">${monkeys}</div><div class="picnic-plate">${foodPieces}</div></div></div></div><div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Food chances left: ${left}</span></div></div>`;
}
function renderBreakdownVisual(){
  return `<div class="visual-panel"><p class="visual-title">Visual clue</p><p class="visual-sub">The digestive system breaks food down into simpler substances so the body can use them.</p><div class="diagram-wrap"><div class="breakdown-scene"><div class="food-card"><div class="plate">🍽️</div></div><div class="flow-pill">break down →</div><div class="crumb-box"><div class="crumb"></div><div class="crumb"></div><div class="crumb"></div><div class="crumb"></div><div class="crumb"></div><div class="crumb"></div></div><div class="flow-pill">used by body →</div><div class="body-card"><div class="person-head">🙂</div><div class="person-body"><div class="energy-particles"><div class="energy-dot"></div><div class="energy-dot"></div><div class="energy-dot"></div><div class="energy-dot"></div></div></div></div></div></div>`;
}
function renderDigestedFoodVisual(){
  return `<div class="visual-panel"><p class="visual-title">Visual clue</p><p class="visual-sub">Food that has already been broken down into simpler substances is called digested food.</p><div class="diagram-wrap"><div class="digested-scene"><div class="bowl">🍲</div><div class="flow-pill">broken down →</div><div class="crumb-box"><div class="crumb"></div><div class="crumb"></div><div class="crumb"></div><div class="crumb"></div><div class="crumb"></div><div class="crumb"></div></div><div class="digested-label">digested food</div></div></div>`;
}
function renderPathVisual(){
  return `<div class="visual-panel"><p class="visual-title">Visual clue</p><p class="visual-sub">Food passes through these parts of the digestive system in order.</p><div class="diagram-wrap"><div class="path-scene"><div class="path-board"><div class="path-row"><div class="path-stop mouth">mouth<div class="food-dot-move"></div></div><div class="path-arrow">→</div><div class="path-stop gullet">gullet<div class="food-dot-move"></div></div><div class="path-arrow">→</div><div class="path-stop stomach">stomach<div class="food-dot-move"></div></div></div><div class="path-row" style="margin-top:10px;"><div class="path-stop small">small intestine<div class="food-dot-move"></div></div><div class="path-arrow">→</div><div class="path-stop large">large intestine<div class="food-dot-move"></div></div><div class="path-arrow">→</div><div class="path-stop anus">anus<div class="food-dot-move"></div></div></div></div></div></div>`;
}
function visualMarkup(screen){
  let visualContent = "";
  if(screen.visualType === "breakdown") visualContent = renderBreakdownVisual();
  else if(screen.visualType === "digested_food") visualContent = renderDigestedFoodVisual();
  else visualContent = renderPathVisual();
  return `<details class="visual-details"><summary>Show visual clue</summary><div class="visual-details-body">${visualContent}</div></details>`;
}
function renderIntro(){
  return `<section class="card hero"><div class="badge">🍽️ Guess the missing science word</div><h1>${escapeHtml(GAME_TITLE)}</h1><p>Each time you start, the screens appear in a random order. Type the full missing word inside the sentence, open the visual clue only when you need it, and watch the monkey-food penalty tracker change expression as wrong tries build up.</p><button class="button primary" id="startBtn">Start game</button></section>`;
}
function renderPlay(){
  const screen = currentScreen();
  const active = getActiveOccurrence(screen);
  const complete = screenSolved(screen);
  return `<div class="main-layout"><section class="card screen-card"><div class="top-row"><div class="label-pill">${escapeHtml(screen.label)}</div><div class="progress">Screen ${state.screenIndex + 1} of ${state.screens.length}</div></div><p class="prompt">${escapeHtml(screen.prompt)}</p><div class="sentence-panel">${buildSentenceMarkup(screen)}</div>${visualMarkup(screen)}<div class="controls"><button class="button primary" id="checkBtn" ${active && active.occurrence.fail ? "disabled" : ""}>Check</button><button class="button secondary" id="readBtn">🔊 Read aloud</button><button class="button ghost" id="nextBtn" ${complete ? "" : "disabled"}>Next screen</button></div><div class="feedback ${state.feedbackTone}">${escapeHtml(state.feedback)}</div><details class="help"><summary>How to play</summary><div class="help-body"><p>Type the full missing word.</p><p>The first letter is shown first. A wrong non-blank answer reveals one more letter.</p><p>If all chances for the current word are used up, only that word flashes, then only that word resets.</p><p>Restarting the game randomizes the screen order again.</p></div></details></section><aside class="card side-card"><h2>Monkey penalty tracker</h2><p class="mini">${escapeHtml(screen.demeritText)}</p>${renderPenaltyTracker(screen)}<p class="mini" style="margin-top:12px;">The tracker resets for the next word.</p></aside></div>`;
}
function renderComplete(){
  const items = state.screens.map((s, i) => `<li>Screen ${i + 1}: ${escapeHtml(s.sentence)}</li>`).join("");
  return `<section class="card hero"><div class="badge">✅ Game complete</div><h1>${escapeHtml(GAME_TITLE)}</h1><p>You completed all the sentence screens in a randomized order.</p><div class="complete-list"><h2>Completed screens</h2><ul>${items}</ul></div><div class="controls" style="justify-content:center; margin-top:20px;"><button class="button primary" id="restartBtn">Restart all</button><button class="button secondary" id="homeBtn">Return to start</button></div></section>`;
}
function render(){
  const app = document.getElementById("app");
  if(!app) return;
  if(state.view === "intro") app.innerHTML = renderIntro();
  else if(state.view === "play") app.innerHTML = renderPlay();
  else app.innerHTML = renderComplete();
  bindEvents();
}
function bindEvents(){
  const startBtn = document.getElementById("startBtn"); if(startBtn) startBtn.addEventListener("click", startGame);
  const restartBtn = document.getElementById("restartBtn"); if(restartBtn) restartBtn.addEventListener("click", restartAll);
  const homeBtn = document.getElementById("homeBtn"); if(homeBtn) homeBtn.addEventListener("click", backToStart);
  const checkBtn = document.getElementById("checkBtn"); if(checkBtn) checkBtn.addEventListener("click", checkGuess);
  const nextBtn = document.getElementById("nextBtn"); if(nextBtn) nextBtn.addEventListener("click", moveNext);
  const readBtn = document.getElementById("readBtn");
  if(readBtn){
    readBtn.addEventListener("click", () => {
      if(state.view === "play"){
        const screen = currentScreen();
        let visualText = "Food is broken down into simpler substances so the body can use them.";
        if(screen.visualType === "digested_food") visualText = "Broken down food is called digested food.";
        if(screen.visualType === "digestive_path") visualText = "Food passes through the mouth, gullet, stomach, small intestine, large intestine and anus.";
        speakText([GAME_TITLE, screen.label, screen.prompt, sentenceForReadAloud(screen), visualText, state.feedback].filter(Boolean).join(". "));
      } else if(state.view === "intro"){
        speakText(`${GAME_TITLE}. Read each sentence and type the missing science word.`);
      } else {
        speakText(`${GAME_TITLE}. You completed all screens.`);
      }
    });
  }
  const input = document.getElementById("activeGuessInput");
  if(input){
    input.addEventListener("input", e => handleInputChange(e.target.value));
    input.addEventListener("keydown", e => { if(e.key === "Enter"){ e.preventDefault(); checkGuess(); }});
  }
}
render();
</script>

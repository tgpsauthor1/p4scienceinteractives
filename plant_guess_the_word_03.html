<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stem Guess-the-Word Game</title>
  <style>
    :root {
      --bg1: #f6fff7;
      --bg2: #edf5ff;
      --panel: #ffffff;
      --ink: #17314e;
      --muted: #5e728d;
      --line: #d8e4f6;
      --accent: #2a69f0;
      --accent-dark: #114cb9;
      --good: #137a44;
      --warn: #9d6100;
      --bad: #a12626;
      --shadow: 0 14px 34px rgba(23, 49, 78, 0.09);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    .app-shell {
      min-height: 100vh;
      padding: 20px 14px 28px;
      display: flex;
      justify-content: center;
    }

    .app {
      width: min(1120px, 100%);
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }

    .hero p {
      margin: 0 auto 20px;
      max-width: 760px;
      font-size: 1.12rem;
      line-height: 1.55;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      padding: 10px 16px;
      background: #eef5ff;
      border: 2px solid #cfe0ff;
      color: var(--accent-dark);
      font-weight: 800;
      margin-bottom: 18px;
    }

    .button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      min-height: 54px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 800;
      transition: transform 0.12s ease, background 0.12s ease, opacity 0.12s ease;
    }

    .button:hover { transform: translateY(-1px); }
    .button:active { transform: translateY(0); }
    .button[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .button.primary {
      background: var(--accent);
      color: white;
    }

    .button.primary:hover {
      background: var(--accent-dark);
    }

    .button.secondary {
      background: #eff5ff;
      color: var(--accent-dark);
      border: 2px solid #d0e0ff;
    }

    .button.ghost {
      background: #f8fbff;
      color: var(--ink);
      border: 2px solid #d7e4f6;
    }

    .main-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 16px;
      align-items: start;
    }

    .screen-card {
      padding: 22px;
    }

    .side-card {
      padding: 18px;
      position: sticky;
      top: 16px;
    }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .label-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 14px;
      background: #eef5ff;
      border: 2px solid #d2e0ff;
      color: var(--accent-dark);
      font-weight: 800;
    }

    .progress {
      font-size: 0.98rem;
      color: var(--muted);
      font-weight: 800;
    }

    .prompt {
      font-size: clamp(1.2rem, 2vw, 1.55rem);
      font-weight: 900;
      margin: 0 0 18px;
    }

    .sentence-panel {
      border: 2px solid #d8e4f6;
      border-radius: 18px;
      background: #fbfdff;
      padding: 18px;
      font-size: clamp(1.28rem, 2.25vw, 1.7rem);
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .plain-token {
      white-space: pre-wrap;
    }

    .guess-wrap {
      display: inline-flex;
      vertical-align: middle;
      margin: 0 4px;
    }

    .guess-chip {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 150px;
      padding: 10px 10px 12px;
      border-radius: 16px;
      border: 2px solid #bfd1ff;
      background: #f3f7ff;
    }

    .guess-chip.future {
      background: #f8fbff;
      border-color: #d6e1f4;
    }

    .guess-chip.solved {
      background: #eefaf2;
      border-color: #bfe5ca;
    }

    .guess-chip.fail {
      background: #fff2f2;
      border-color: #f0c5c5;
      animation: pulse 0.9s infinite;
    }

    .clue {
      font-size: 1.06rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      color: var(--accent-dark);
      text-transform: lowercase;
      min-height: 1.2em;
    }

    .solved-word, .flash-word {
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 1.15rem;
      font-weight: 900;
    }

    .solved-word {
      color: var(--good);
      background: #e8f8ee;
    }

    .flash-word {
      color: var(--bad);
      background: #ffe2e2;
    }

    .guess-input {
      width: 180px;
      min-width: 120px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid #97b8f5;
      font-size: 1rem;
      font-weight: 800;
      text-align: center;
      color: var(--ink);
      background: #fff;
    }

    .guess-input:focus {
      outline: 3px solid rgba(42, 105, 240, 0.18);
      border-color: var(--accent);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
    }

    .feedback {
      margin-top: 14px;
      min-height: 58px;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.5;
      border: 2px solid #dce6f7;
      background: #f7fbff;
    }

    .feedback.good {
      background: #eefaf2;
      border-color: #bfe5ca;
      color: var(--good);
    }

    .feedback.warn {
      background: #fff8ee;
      border-color: #f1d6ad;
      color: var(--warn);
    }

    .feedback.bad {
      background: #fff2f2;
      border-color: #f0c5c5;
      color: var(--bad);
    }

    .side-card h2 {
      margin: 0 0 12px;
      font-size: 1.18rem;
    }

    .mini {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.97rem;
      line-height: 1.45;
    }

    .tracker-frame {
      border: 2px solid #d8e4f6;
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(180deg, #fbfffd 0%, #f4fbff 100%);
    }

    .tracker-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .face-bubble {
      width: 84px;
      height: 84px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 2.15rem;
      border: 3px solid #d7e3f6;
      box-shadow: 0 8px 18px rgba(23, 50, 77, 0.08);
      background: linear-gradient(180deg, #f7fff9 0%, #edfff2 100%);
    }

    .face-bubble.worried { background: linear-gradient(180deg, #fff9ef 0%, #fff0d8 100%); }
    .face-bubble.angry { background: linear-gradient(180deg, #fff3f3 0%, #ffe0e0 100%); }
    .face-bubble.fail { background: linear-gradient(180deg, #f7f1ff 0%, #ece2ff 100%); }

    .face-caption {
      min-height: 1.3em;
      font-size: 0.97rem;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
    }

    .tracker-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .tracker-chip {
      min-width: 34px;
      min-height: 34px;
      padding: 4px 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      border: 2px solid #d5e2f6;
      background: #fff;
    }

    .tracker-chip.lost {
      opacity: 0.42;
      filter: grayscale(1);
    }

    .tracker-stats {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--muted);
    }

    .scene {
      min-height: 176px;
      display: grid;
      place-items: center;
      padding: 8px 6px;
    }

    .falling-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .stem-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transform-origin: bottom center;
      transition: transform 0.2s ease;
    }

    .stem-face {
      width: 82px;
      height: 82px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 2rem;
      background: radial-gradient(circle at 30% 25%, #93e28a 0%, #4fbe68 60%, #2b9148 100%);
      border: 3px solid #2b9148;
    }

    .tall-stem {
      width: 12px;
      height: 92px;
      border-radius: 999px;
      background: linear-gradient(180deg, #55be75 0%, #28834c 100%);
      position: relative;
    }

    .tall-stem::before,
    .tall-stem::after {
      content: "";
      position: absolute;
      width: 44px;
      height: 16px;
      border-radius: 999px 999px 999px 0;
      top: 24px;
      background: linear-gradient(90deg, #61cb80 0%, #2d9858 100%);
    }

    .tall-stem::before {
      left: -38px;
      transform: rotate(-30deg);
    }

    .tall-stem::after {
      right: -38px;
      transform: scaleX(-1) rotate(-30deg);
    }

    .leaf-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .leaf-item {
      font-size: 1.4rem;
    }

    .leaf-item.yellow {
      filter: sepia(1) saturate(4) hue-rotate(-20deg) brightness(1.02);
    }

    .leaf-item.lost {
      opacity: 0.3;
      filter: grayscale(1);
    }

    .pot {
      width: 110px;
      height: 56px;
      border-radius: 10px 10px 18px 18px;
      background: linear-gradient(180deg, #ab724e 0%, #835235 100%);
      position: relative;
    }

    .pot::before {
      content: "";
      position: absolute;
      left: -6px;
      right: -6px;
      top: -10px;
      height: 14px;
      border-radius: 14px;
      background: linear-gradient(180deg, #b97a55 0%, #8f5b3d 100%);
    }

    .tree-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .tree-top {
      width: 122px;
      height: 122px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 2rem;
      background: radial-gradient(circle at 35% 28%, #9be891 0%, #59c468 58%, #2f944a 100%);
      border: 4px solid #2f944a;
      position: relative;
    }

    .tree-trunk {
      width: 28px;
      height: 98px;
      border-radius: 12px;
      background: linear-gradient(180deg, #9e6a46 0%, #724629 100%);
    }

    .strength-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .paper-sheet {
      width: 108px;
      height: 138px;
      background: linear-gradient(180deg, #ffffff 0%, #f1f1f1 100%);
      border: 3px solid #d8d8d8;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 2rem;
      box-shadow: inset 0 0 0 2px #f7f7f7;
    }

    .herb-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .sprout-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .sprout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 1.1rem;
    }

    .sprout .sprout-stem {
      width: 8px;
      height: 30px;
      border-radius: 999px;
      background: linear-gradient(180deg, #61c779 0%, #2b8f56 100%);
      position: relative;
    }

    .sprout .sprout-stem::before,
    .sprout .sprout-stem::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 10px;
      top: 6px;
      background: linear-gradient(90deg, #69ce85 0%, #2d9858 100%);
      border-radius: 999px 999px 999px 0;
    }

    .sprout .sprout-stem::before {
      left: -18px;
      transform: rotate(-28deg);
    }

    .sprout .sprout-stem::after {
      right: -18px;
      transform: scaleX(-1) rotate(-28deg);
    }

    .sprout.lost {
      opacity: 0.22;
      filter: grayscale(1);
    }

    .cry-pot {
      width: 112px;
      height: 62px;
      border-radius: 12px 12px 18px 18px;
      background: linear-gradient(180deg, #9e6b45 0%, #7b4b31 100%);
      position: relative;
      display: grid;
      place-items: center;
      color: white;
      font-size: 1.7rem;
    }

    .cry-pot::before {
      content: "";
      position: absolute;
      left: -6px;
      right: -6px;
      top: -10px;
      height: 14px;
      border-radius: 14px;
      background: linear-gradient(180deg, #ad7b53 0%, #88553a 100%);
    }

    .basket-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .basket-icons {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .basket {
      width: 132px;
      height: 76px;
      border-radius: 16px 16px 18px 18px;
      background: linear-gradient(180deg, #d8a55b 0%, #b17a39 100%);
      border: 3px solid #9b6528;
      display: grid;
      place-items: center;
      position: relative;
      font-size: 1.8rem;
    }

    .basket::before {
      content: "";
      position: absolute;
      width: 76px;
      height: 30px;
      border: 5px solid #9b6528;
      border-bottom: 0;
      border-radius: 999px 999px 0 0;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
    }

    .basket-stem {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .basket-face {
      width: 76px;
      height: 76px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 1.9rem;
      background: radial-gradient(circle at 30% 25%, #93e28a 0%, #4fbe68 60%, #2b9148 100%);
      border: 3px solid #2b9148;
    }

    .hidden-inside {
      font-size: 1.9rem;
    }

    .fail-box {
      min-height: 176px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--bad);
      font-weight: 900;
      line-height: 1.45;
      background: #fff4f4;
      border: 2px dashed #efc1c1;
      border-radius: 16px;
      padding: 12px;
    }

    details.help {
      margin-top: 18px;
      border: 2px solid #d8e4f6;
      border-radius: 16px;
      overflow: hidden;
      background: #fbfdff;
    }

    details.help summary {
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 800;
      user-select: none;
      list-style: none;
    }

    details.help summary::-webkit-details-marker {
      display: none;
    }

    .help-body {
      padding: 0 16px 16px;
      border-top: 2px solid #e5edf9;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.98rem;
    }

    .help-body p { margin: 12px 0 0; }

    .complete-list {
      margin: 18px auto 0;
      max-width: 760px;
      text-align: left;
      border: 2px solid #d8e4f6;
      border-radius: 18px;
      background: #fbfdff;
      padding: 16px 18px;
    }

    .complete-list h2 {
      margin: 0 0 10px;
      font-size: 1.15rem;
    }

    .complete-list ul {
      margin: 0;
      padding-left: 20px;
      line-height: 1.7;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    @media (max-width: 920px) {
      .main-layout {
        grid-template-columns: 1fr;
      }
      .side-card {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .app-shell {
        padding: 14px 10px 22px;
      }
      .hero, .screen-card, .side-card {
        padding: 18px;
      }
      .sentence-panel {
        font-size: 1.15rem;
        line-height: 1.75;
      }
      .guess-chip {
        min-width: 130px;
      }
      .guess-input {
        width: min(160px, 52vw);
      }
      .controls {
        align-items: stretch;
      }
      .button {
        width: 100%;
      }
    }
  </style>
</head>

    const GAME_TITLE = "Stem Guess-the-Word Game";

["strong"], "demeritText": "The tree becomes weaker.", "failText": "The tree becomes paper.", "theme": "weak_tree"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Herbs have non-woody stems.", "targets": ["woody"], "demeritText": "More herbs get plucked out.", "failText": "The empty pot of soil cries.", "theme": "plucked_herbs"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Herbs have non-woody stems.", "targets": ["stems"], "demeritText": "More herbs get plucked out.", "failText": "The empty pot of soil cries.", "theme": "plucked_herbs"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The stem transports water, mineral salts, and food to various parts of the plant.", "targets": ["stem"], "demeritText": "The stem gets more worried as pictures of water, mineral salts, and food start to disappear from its basket.", "failText": "The stem hides inside the empty basket.", "theme": "basket_transport"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The stem transports water, mineral salts, and food to various parts of the plant.", "targets": ["transports"], "demeritText": "The stem gets more worried as pictures of water, mineral salts, and food start to disappear from its basket.", "failText": "The stem hides inside the empty basket.", "theme": "basket_transport"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The stem transports water, mineral salts, and food to various parts of the plant.", "targets": ["water"], "demeritText": "The stem gets more worried as pictures of water, mineral salts, and food start to disappear from its basket.", "failText": "The stem hides inside the empty basket.", "theme": "basket_transport"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The stem transports water, mineral salts, and food to various parts of the plant.", "targets": ["mineral", "salts"], "demeritText": "The stem gets more worried as pictures of water, mineral salts, and food start to disappear from its basket.", "failText": "The stem hides inside the empty basket.", "theme": "basket_transport"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "The stem transports water, mineral salts, and food to various parts of the plant.", "targets": ["food"], "demeritText": "The stem gets more worried as pictures of water, mineral salts, and food start to disappear from its basket.", "failText": "The stem hides inside the empty basket.", "theme": "basket_transport"}];

    const state = {
      view: "intro",
      screenIndex: 0,

      currentInput: "",
      feedback: "",
      feedbackTone: "warn"
    };

    function normalizeWord(text) {
      return (text || "").toLowerCase().replace(/[^a-z0-9]/gi, "");
    }

    function tokenize(sentence) {
      return sentence.match(/(\s+|[A-Za-z']+|[^A-Za-z'\s]+)/g) || [];
    }

    function shuffleArray(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function prepareScreens(rawScreens) {
      return rawScreens.map((screen, idx) => {
        const tokens = tokenize(screen.sentence);
        const targetSet = new Set(screen.targets.map(t => normalizeWord(t)));
        const occurrences = [];

        tokens.forEach((token, tokenIndex) => {
          const normalized = normalizeWord(token);
          if (normalized && targetSet.has(normalized)) {
            occurrences.push({
              tokenIndex,
              originalToken: token,
              target: token,
              solved: false,
              fail: false,
              wrongAttempts: 0,
              revealedCount: 1,
              chanceLimit: Math.max(normalized.length - 2, 1)
            });
          }
        });

        return {
          ...screen,
          tokens,
          occurrences,
          orderLabel: idx + 1
        };
      });
    }

    function activeOccurrenceIndex(screen) {
      return screen.occurrences.findIndex(o => !o.solved);
    }

    function getActiveOccurrence(screen) {
      const index = activeOccurrenceIndex(screen);
      if (index === -1) return null;
      return { index, occurrence: screen.occurrences[index] };
    }

    function clueText(target, revealedCount) {
      const clean = target.replace(/[^A-Za-z0-9]/g, "");
      const shown = clean.slice(0, Math.max(1, revealedCount));
      const hidden = clean.slice(Math.max(1, revealedCount)).split("").map(() => "_").join(" ");
      return hidden ? `${shown} ${hidden}` : shown;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(text) {
      return escapeHtml(text).replace(/`/g, "&#96;");
    }

    function clearSpeech() {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    }

    function speakText(text) {
      if (!("speechSynthesis" in window)) return;
      clearSpeech();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.96;
      utterance.pitch = 1;
      window.speechSynthesis.speak(utterance);
    }

    function currentScreen() {
      return state.screens[state.screenIndex];
    }

    function screenSolved(screen) {
      return screen.occurrences.every(o => o.solved);
    }

    function sentenceForReadAloud(screen) {
      return screen.tokens.map((token, tokenIndex) => {
        const occIndex = screen.occurrences.findIndex(o => o.tokenIndex === tokenIndex);
        if (occIndex === -1) return token;
        const occ = screen.occurrences[occIndex];
        if (occ.solved || occ.fail) return occ.originalToken;
        return "blank";
      }).join("");
    }

    function updateFeedback(text, tone) {
      state.feedback = text;
      state.feedbackTone = tone;
    }

    function startGame() {
      const shuffled = shuffleArray(SOURCE_SCREENS);
      state.screens = prepareScreens(shuffled);
      state.view = "play";
      state.screenIndex = 0;
      state.currentInput = "";
      updateFeedback("Type the full missing word and tap Check.", "warn");
      render();
      focusActiveInput();
    }

    function restartAll() {
      clearSpeech();
      startGame();
    }

    function backToStart() {
      clearSpeech();
      state.view = "intro";
      state.screenIndex = 0;
      state.screens = [];
      state.currentInput = "";
      state.feedback = "";
      state.feedbackTone = "warn";
      render();
    }

    function focusActiveInput() {
      requestAnimationFrame(() => {
        const input = document.getElementById("activeGuessInput");
        if (input && !input.disabled) {
          input.focus();
          input.select();
        }
      });
    }

    function moveNext() {
      if (state.screenIndex < state.screens.length - 1) {
        state.screenIndex += 1;
        state.currentInput = "";
        updateFeedback("Type the full missing word and tap Check.", "warn");
        render();
        focusActiveInput();
      } else {
        state.view = "complete";
        render();
      }
    }

    function handleInputChange(value) {
      state.currentInput = value.replace(/\s+/g, "");
    }

    function resetFailedOccurrence(screen, occ) {
      occ.fail = false;
      occ.wrongAttempts = 0;
      occ.revealedCount = 1;
      state.currentInput = "";
      updateFeedback("That word has reset. Try again from the first clue.", "warn");
      render();
      focusActiveInput();
    }

    function checkGuess() {
      const screen = currentScreen();
      if (!screen) return;
      const active = getActiveOccurrence(screen);
      if (!active) return;

      const occ = active.occurrence;
      if (occ.fail) return;

      const guess = state.currentInput.trim();
      if (!guess) {
        updateFeedback("Type the full word first.", "warn");
        render();
        focusActiveInput();
        return;
      }

      if (normalizeWord(guess) === normalizeWord(occ.target)) {
        occ.solved = true;
        occ.fail = false;
        state.currentInput = "";
        updateFeedback(screenSolved(screen) ? "Correct. This sentence is complete." : "Correct. Now solve the next missing word.", "good");
        render();
        focusActiveInput();
        return;
      }

      occ.wrongAttempts += 1;
      occ.revealedCount = Math.min(normalizeWord(occ.target).length, occ.revealedCount + 1);

      if (occ.wrongAttempts >= occ.chanceLimit) {
        occ.fail = true;
        updateFeedback(screen.failText, "bad");
        render();
        window.setTimeout(() => {
          resetFailedOccurrence(screen, occ);
        }, FLASH_DURATION_MS);
        return;
      }

      updateFeedback(screen.demeritText + " One more letter is now shown.", "warn");
      render();
      focusActiveInput();
    }

    function buildSentenceMarkup(screen) {
      const active = getActiveOccurrence(screen);
      const activeIndex = active ? active.index : -1;

      return screen.tokens.map((token, tokenIndex) => {
        const occIndex = screen.occurrences.findIndex(o => o.tokenIndex === tokenIndex);
        if (occIndex === -1) {
          return `<span class="plain-token">${escapeHtml(token)}</span>`;
        }

        const occ = screen.occurrences[occIndex];

        if (occ.solved) {
          return `<span class="guess-wrap"><span class="guess-chip solved"><span class="solved-word">${escapeHtml(occ.originalToken)}</span></span></span>`;
        }

        if (occ.fail) {
          return `<span class="guess-wrap"><span class="guess-chip fail"><span class="flash-word">${escapeHtml(occ.originalToken)}</span></span></span>`;
        }

        if (occIndex === activeIndex) {
          const width = Math.max(120, normalizeWord(occ.target).length * 18 + 80);
          return `
            <span class="guess-wrap">
              <label class="guess-chip" aria-label="Missing word input">
                <span class="clue">${escapeHtml(clueText(occ.target, occ.revealedCount))}</span>
                <input
                  id="activeGuessInput"
                  class="guess-input"
                  type="text"
                  autocomplete="off"
                  autocapitalize="none"
                  spellcheck="false"
                  inputmode="text"
                  maxlength="${normalizeWord(occ.target).length + 2}"
                  placeholder="Type full word"
                  style="width:${width}px"
                  value="${escapeAttribute(state.currentInput)}"
                />
              </label>
            </span>
          `;
        }

        return `<span class="guess-wrap"><span class="guess-chip future"><span class="clue">${escapeHtml(clueText(occ.target, 1))}</span></span></span>`;
      }).join("");
    }

    function failCaption(theme) {
      if (theme === "falling_stem") return "The leaves have all fallen off.";
      if (theme === "weak_tree") return "The tree has turned into paper.";
      if (theme === "plucked_herbs") return "The empty pot is crying.";
      if (theme === "basket_transport") return "The stem is hiding in the basket.";
      return "The penalty is complete.";
    }

    function faceState(theme, used, total, fail) {
      if (fail) {
        if (theme === "weak_tree") return { cls: "fail", emoji: "📄", caption: failCaption(theme) };
        if (theme === "plucked_herbs") return { cls: "fail", emoji: "😭", caption: failCaption(theme) };
        if (theme === "basket_transport") return { cls: "fail", emoji: "😶", caption: failCaption(theme) };
        return { cls: "fail", emoji: "😵", caption: failCaption(theme) };
      }
      if (used === 0) {
        if (theme === "weak_tree") return { cls: "", emoji: "😄", caption: "The tree feels strong." };
        if (theme === "plucked_herbs") return { cls: "", emoji: "🙂", caption: "The herbs are still in the pot." };
        if (theme === "basket_transport") return { cls: "", emoji: "🙂", caption: "The basket is still full." };
        return { cls: "", emoji: "😄", caption: "The stem is standing tall." };
      }
      const ratio = used / total;
      if (ratio < 0.5) {
        if (theme === "weak_tree") return { cls: "worried", emoji: "😟", caption: "The tree is getting weaker." };
        if (theme === "plucked_herbs") return { cls: "worried", emoji: "😧", caption: "Some herbs have been plucked out." };
        if (theme === "basket_transport") return { cls: "worried", emoji: "😟", caption: "The stem is getting worried." };
        return { cls: "worried", emoji: "😟", caption: "The stem is leaning more." };
      }
      if (theme === "weak_tree") return { cls: "angry", emoji: "😣", caption: "The tree is almost too weak." };
      if (theme === "plucked_herbs") return { cls: "angry", emoji: "😭", caption: "Only a few herbs are left." };
      if (theme === "basket_transport") return { cls: "angry", emoji: "😰", caption: "The basket is nearly empty." };
      return { cls: "angry", emoji: "😣", caption: "The leaves are turning yellower." };
    }

    function renderFallingStem(used, total, fail, screen) {
      const face = faceState("falling_stem", used, total, fail);
      const left = Math.max(total - used, 0);

      if (fail) {
        return `
          <div class="tracker-frame">
            <div class="fail-box">
              <div class="tracker-top">
                <div class="face-bubble fail">😵</div>
                <div class="face-caption">${escapeHtml(failCaption("falling_stem"))}</div>
              </div>
              <div>🍂🍂🍂<br>${escapeHtml(screen.failText)}</div>
            </div>
          </div>
        `;
      }

      const leafIcons = Array.from({ length: total }, (_, i) => {
        if (i < used) return `<span class="leaf-item yellow">🍃</span>`;
        return `<span class="leaf-item">🍃</span>`;
      }).join("");

      const tilt = Math.min(used * 8, 26);

      return `
        <div class="tracker-frame">
          <div class="leaf-row">${leafIcons}</div>
          <div class="scene">
            <div class="falling-wrap">
              <div class="tracker-top">
                <div class="face-bubble ${face.cls}">${face.emoji}</div>
                <div class="face-caption">${face.caption}</div>
              </div>
              <div class="stem-body" style="transform: rotate(-${tilt}deg);">
                <div class="stem-face">${face.emoji}</div>
                <div class="tall-stem"></div>
                <div class="pot"></div>
              </div>
            </div>
          </div>
          <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Green leaves left: ${left}</span></div>
        </div>
      `;
    }

    function renderWeakTree(used, total, fail, screen) {
      const face = faceState("weak_tree", used, total, fail);
      const left = Math.max(total - used, 0);

      if (fail) {
        return `
          <div class="tracker-frame">
            <div class="scene">
              <div class="tree-wrap">
                <div class="tracker-top">
                  <div class="face-bubble fail">📄</div>
                  <div class="face-caption">${escapeHtml(failCaption("weak_tree"))}</div>
                </div>
                <div class="paper-sheet">😵</div>
              </div>
            </div>
            <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Wood strength left: 0</span></div>
          </div>
        `;
      }

      const strength = Array.from({ length: total }, (_, i) => `<span class="tracker-chip ${i < used ? "lost" : ""}">${i < used ? "🪵" : "💪"}</span>`).join("");
      const canopyScale = Math.max(0.74, 1 - used * 0.08);

      return `
        <div class="tracker-frame">
          <div class="strength-row">${strength}</div>
          <div class="scene">
            <div class="tree-wrap">
              <div class="tracker-top">
                <div class="face-bubble ${face.cls}">${face.emoji}</div>
                <div class="face-caption">${face.caption}</div>
              </div>
              <div class="tree-top" style="transform: scale(${canopyScale});">${face.emoji}</div>
              <div class="tree-trunk"></div>
            </div>
          </div>
          <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Wood strength left: ${left}</span></div>
        </div>
      `;
    }

    function renderPluckedHerbs(used, total, fail, screen) {
      const face = faceState("plucked_herbs", used, total, fail);
      const left = Math.max(total - used, 0);

      if (fail) {
        return `
          <div class="tracker-frame">
            <div class="scene">
              <div class="herb-wrap">
                <div class="tracker-top">
                  <div class="face-bubble fail">😭</div>
                  <div class="face-caption">${escapeHtml(failCaption("plucked_herbs"))}</div>
                </div>
                <div class="cry-pot">😭</div>
              </div>
            </div>
            <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Herbs left: 0</span></div>
          </div>
        `;
      }

      const sprouts = Array.from({ length: total }, (_, i) => `
        <div class="sprout ${i < used ? "lost" : ""}">
          <div>${i < used ? "🍂" : "🍃"}</div>
          <div class="sprout-stem"></div>
        </div>
      `).join("");

      return `
        <div class="tracker-frame">
          <div class="scene">
            <div class="herb-wrap">
              <div class="tracker-top">
                <div class="face-bubble ${face.cls}">${face.emoji}</div>
                <div class="face-caption">${face.caption}</div>
              </div>
              <div class="sprout-row">${sprouts}</div>
              <div class="pot">🪴</div>
            </div>
          </div>
          <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Herbs left: ${left}</span></div>
        </div>
      `;
    }

    function renderBasketTransport(used, total, fail, screen) {
      const face = faceState("basket_transport", used, total, fail);
      const left = Math.max(total - used, 0);

      if (fail) {
        return `
          <div class="tracker-frame">
            <div class="scene">
              <div class="basket-wrap">
                <div class="tracker-top">
                  <div class="face-bubble fail">😶</div>
                  <div class="face-caption">${escapeHtml(failCaption("basket_transport"))}</div>
                </div>
                <div class="basket"><span class="hidden-inside">🙈</span></div>
              </div>
            </div>
            <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Basket items left: 0</span></div>
          </div>
        `;
      }

      const allIcons = ["💧", "🧂", "🍚", "💧", "🧂", "🍚"];
      const visibleCount = Math.max(allIcons.length - used, 0);
      const icons = allIcons.map((icon, i) => `<span class="tracker-chip ${i >= visibleCount ? "lost" : ""}">${icon}</span>`).join("");

      return `
        <div class="tracker-frame">
          <div class="basket-icons">${icons}</div>
          <div class="scene">
            <div class="basket-wrap">
              <div class="tracker-top">
                <div class="face-bubble ${face.cls}">${face.emoji}</div>
                <div class="face-caption">${face.caption}</div>
              </div>
              <div class="basket-stem">
                <div class="basket-face">${face.emoji}</div>
                <div class="basket">🧺</div>
              </div>
            </div>
          </div>
          <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Basket items left: ${left}</span></div>
        </div>
      `;
    }

    function trackerMarkup(screen) {
      const active = getActiveOccurrence(screen);
      if (!active) {
        return `
          <div class="tracker-frame">
            <div class="scene">
              <div class="tracker-top">
                <div class="face-bubble">😄</div>
                <div class="face-caption">This screen is complete.</div>
              </div>
            </div>
          </div>
        `;
      }

      const occ = active.occurrence;
      if (screen.theme === "falling_stem") return renderFallingStem(occ.wrongAttempts, occ.chanceLimit, occ.fail, screen);
      if (screen.theme === "weak_tree") return renderWeakTree(occ.wrongAttempts, occ.chanceLimit, occ.fail, screen);
      if (screen.theme === "plucked_herbs") return renderPluckedHerbs(occ.wrongAttempts, occ.chanceLimit, occ.fail, screen);
      return renderBasketTransport(occ.wrongAttempts, occ.chanceLimit, occ.fail, screen);
    }

    function renderIntro() {
      return `
        <section class="card hero">
          <div class="badge">🌱 Guess the missing science word</div>
          <h1>${escapeHtml(GAME_TITLE)}</h1>
          <p>
            Each time you start, the screens appear in a random order.
            Type the full missing word inside the sentence and watch the penalty tracker change expression as wrong tries build up.
          </p>
          <button class="button primary" id="startBtn">Start game</button>
        </section>
      `;
    }

    function renderPlay() {
      const screen = currentScreen();
      const active = getActiveOccurrence(screen);
      const complete = screenSolved(screen);

      return `
        <div class="main-layout">
          <section class="card screen-card">
            <div class="top-row">
              <div class="label-pill">${escapeHtml(screen.label)}</div>
              <div class="progress">Screen ${state.screenIndex + 1} of ${state.screens.length}</div>
            </div>

            <p class="prompt">${escapeHtml(screen.prompt)}</p>

            <div class="sentence-panel">${buildSentenceMarkup(screen)}</div>

            <div class="controls">
              <button class="button primary" id="checkBtn" ${active && active.occurrence.fail ? "disabled" : ""}>Check</button>
              <button class="button secondary" id="readBtn">🔊 Read aloud</button>
              <button class="button ghost" id="nextBtn" ${complete ? "" : "disabled"}>Next screen</button>
            </div>

            <div class="feedback ${state.feedbackTone}">${escapeHtml(state.feedback)}</div>

            <details class="help">
              <summary>How to play</summary>
              <div class="help-body">
                <p>Type the full missing word.</p>
                <p>The first letter is shown first. A wrong non-blank answer reveals one more letter.</p>
                <p>If all chances for the current word are used up, only that word flashes, then only that word resets.</p>
                <p>Restarting the game randomizes the screen order again.</p>
              </div>
            </details>
          </section>

          <aside class="card side-card">
            <h2>Penalty tracker</h2>
            <p class="mini">${escapeHtml(screen.demeritText)}</p>
            ${trackerMarkup(screen)}
            <p class="mini" style="margin-top:12px;">The tracker resets for the next word.</p>
          </aside>
        </div>
      `;
    }

    function renderComplete() {
      const items = state.screens.map((s, i) => `<li>Screen ${i + 1}: ${escapeHtml(s.sentence)}</li>`).join("");
      return `
        <section class="card hero">
          <div class="badge">✅ Game complete</div>
          <h1>${escapeHtml(GAME_TITLE)}</h1>
          <p>You completed all the sentence screens in a randomized order.</p>
          <div class="complete-list">
            <h2>Completed screens</h2>
            <ul>${items}</ul>
          </div>
          <div class="controls" style="justify-content:center; margin-top:20px;">
            <button class="button primary" id="restartBtn">Restart all</button>
            <button class="button secondary" id="homeBtn">Return to start</button>
          </div>
        </section>
      `;
    }

    function render() {
      const app = document.getElementById("app");
      if (!app) return;
      if (state.view === "intro") app.innerHTML = renderIntro();
      else if (state.view === "play") app.innerHTML = renderPlay();
      else app.innerHTML = renderComplete();
      bindEvents();
    }

    function bindEvents() {
      const startBtn = document.getElementById("startBtn");
      if (startBtn) startBtn.addEventListener("click", startGame);

      const restartBtn = document.getElementById("restartBtn");
      if (restartBtn) restartBtn.addEventListener("click", restartAll);

      const homeBtn = document.getElementById("homeBtn");
      if (homeBtn) homeBtn.addEventListener("click", backToStart);

      const checkBtn = document.getElementById("checkBtn");
      if (checkBtn) checkBtn.addEventListener("click", checkGuess);

      const nextBtn = document.getElementById("nextBtn");
      if (nextBtn) nextBtn.addEventListener("click", moveNext);

      const readBtn = document.getElementById("readBtn");
      if (readBtn) {
        readBtn.addEventListener("click", () => {
          if (state.view === "play") {
            const screen = currentScreen();
            speakText([GAME_TITLE, screen.label, screen.prompt, sentenceForReadAloud(screen), state.feedback].filter(Boolean).join(". "));
          } else if (state.view === "intro") {
            speakText(`${GAME_TITLE}. Read each sentence and type the missing science word.`);
          } else {
            speakText(`${GAME_TITLE}. You completed all screens.`);
          }
        });
      }

      const input = document.getElementById("activeGuessInput");
      if (input) {
        input.addEventListener("input", (e) => {
          handleInputChange(e.target.value);
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            checkGuess();
          }
        });
      }
    }

    render();
  </script>
</body>
</html>

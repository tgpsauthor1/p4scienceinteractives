<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roots Guess-the-Word Game</title>
  <style>
    :root {
      --bg1: #f8fff6;
      --bg2: #eef4ff;
      --panel: #ffffff;
      --ink: #18314a;
      --muted: #5f738d;
      --line: #d8e4f6;
      --accent: #2a69f0;
      --accent-dark: #114cb9;
      --good: #137a44;
      --warn: #9b6200;
      --bad: #a12727;
      --shadow: 0 14px 34px rgba(24, 49, 74, 0.09);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    .app-shell {
      min-height: 100vh;
      padding: 20px 14px 28px;
      display: flex;
      justify-content: center;
    }

    .app {
      width: min(1120px, 100%);
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }

    .hero p {
      margin: 0 auto 20px;
      max-width: 760px;
      font-size: 1.12rem;
      line-height: 1.55;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      padding: 10px 16px;
      background: #eef5ff;
      border: 2px solid #cfe0ff;
      color: var(--accent-dark);
      font-weight: 800;
      margin-bottom: 18px;
    }

    .button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      min-height: 54px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 800;
      transition: transform 0.12s ease, background 0.12s ease, opacity 0.12s ease;
    }

    .button:hover { transform: translateY(-1px); }
    .button:active { transform: translateY(0); }
    .button[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .button.primary {
      background: var(--accent);
      color: white;
    }

    .button.primary:hover {
      background: var(--accent-dark);
    }

    .button.secondary {
      background: #eff5ff;
      color: var(--accent-dark);
      border: 2px solid #d0e0ff;
    }

    .button.ghost {
      background: #f8fbff;
      color: var(--ink);
      border: 2px solid #d7e4f6;
    }

    .main-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 16px;
      align-items: start;
    }

    .screen-card {
      padding: 22px;
    }

    .side-card {
      padding: 18px;
      position: sticky;
      top: 16px;
    }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .label-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 14px;
      background: #eef5ff;
      border: 2px solid #d2e0ff;
      color: var(--accent-dark);
      font-weight: 800;
    }

    .progress {
      font-size: 0.98rem;
      color: var(--muted);
      font-weight: 800;
    }

    .prompt {
      font-size: clamp(1.2rem, 2vw, 1.55rem);
      font-weight: 900;
      margin: 0 0 18px;
    }

    .sentence-panel {
      border: 2px solid #d8e4f6;
      border-radius: 18px;
      background: #fbfdff;
      padding: 18px;
      font-size: clamp(1.28rem, 2.25vw, 1.7rem);
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .plain-token {
      white-space: pre-wrap;
    }

    .guess-wrap {
      display: inline-flex;
      vertical-align: middle;
      margin: 0 4px;
    }

    .guess-chip {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 150px;
      padding: 10px 10px 12px;
      border-radius: 16px;
      border: 2px solid #bfd1ff;
      background: #f3f7ff;
    }

    .guess-chip.future {
      background: #f8fbff;
      border-color: #d6e1f4;
    }

    .guess-chip.solved {
      background: #eefaf2;
      border-color: #bfe5ca;
    }

    .guess-chip.fail {
      background: #fff2f2;
      border-color: #f0c5c5;
      animation: pulse 0.9s infinite;
    }

    .clue {
      font-size: 1.06rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      color: var(--accent-dark);
      text-transform: lowercase;
      min-height: 1.2em;
    }

    .solved-word, .flash-word {
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 1.15rem;
      font-weight: 900;
    }

    .solved-word {
      color: var(--good);
      background: #e8f8ee;
    }

    .flash-word {
      color: var(--bad);
      background: #ffe2e2;
    }

    .guess-input {
      width: 180px;
      min-width: 120px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid #97b8f5;
      font-size: 1rem;
      font-weight: 800;
      text-align: center;
      color: var(--ink);
      background: #fff;
    }

    .guess-input:focus {
      outline: 3px solid rgba(42, 105, 240, 0.18);
      border-color: var(--accent);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
    }

    .feedback {
      margin-top: 14px;
      min-height: 58px;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.5;
      border: 2px solid #dce6f7;
      background: #f7fbff;
    }

    .feedback.good {
      background: #eefaf2;
      border-color: #bfe5ca;
      color: var(--good);
    }

    .feedback.warn {
      background: #fff8ee;
      border-color: #f1d6ad;
      color: var(--warn);
    }

    .feedback.bad {
      background: #fff2f2;
      border-color: #f0c5c5;
      color: var(--bad);
    }

    .side-card h2 {
      margin: 0 0 12px;
      font-size: 1.18rem;
    }

    .mini {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.97rem;
      line-height: 1.45;
    }

    .tracker-frame {
      border: 2px solid #d8e4f6;
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(180deg, #fbfffd 0%, #f4fbff 100%);
    }

    .tracker-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .face-bubble {
      width: 84px;
      height: 84px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 2.15rem;
      border: 3px solid #d7e3f6;
      box-shadow: 0 8px 18px rgba(23, 50, 77, 0.08);
      background: linear-gradient(180deg, #f7fff9 0%, #edfff2 100%);
    }

    .face-bubble.worried { background: linear-gradient(180deg, #fff9ef 0%, #fff0d8 100%); }
    .face-bubble.angry { background: linear-gradient(180deg, #fff3f3 0%, #ffe0e0 100%); }
    .face-bubble.fail { background: linear-gradient(180deg, #f7f1ff 0%, #ece2ff 100%); }

    .face-caption {
      min-height: 1.3em;
      font-size: 0.97rem;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
    }

    .tracker-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .tracker-chip {
      min-width: 34px;
      min-height: 34px;
      padding: 4px 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      border: 2px solid #d5e2f6;
      background: #fff;
    }

    .tracker-chip.lost {
      opacity: 0.34;
      filter: grayscale(1);
    }

    .tracker-stats {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--muted);
    }

    .scene {
      min-height: 176px;
      display: grid;
      place-items: center;
      padding: 8px 6px;
    }

    .carrot-scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .ground-strip {
      width: 180px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(180deg, #8b5a3a 0%, #6d4128 100%);
      display: grid;
      place-items: center;
      color: #f2e6da;
      font-weight: 800;
      position: relative;
    }

    .carrot-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transform-origin: bottom center;
      transition: transform 0.2s ease;
    }

    .carrot-face {
      width: 76px;
      height: 76px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 1.95rem;
      background: radial-gradient(circle at 35% 25%, #ffefcf 0%, #ffd08f 62%, #efb96a 100%);
      border: 3px solid #e9bb73;
    }

    .carrot-body {
      width: 76px;
      height: 124px;
      background: linear-gradient(180deg, #ffab4a 0%, #ef7b1c 80%);
      clip-path: polygon(20% 0%, 80% 0%, 100% 18%, 76% 100%, 24% 100%, 0% 18%);
      position: relative;
      display: grid;
      place-items: start center;
      padding-top: 6px;
      color: #1b5b23;
      font-size: 1.6rem;
    }

    .carrot-top {
      letter-spacing: -2px;
    }

    .bunny-eats {
      width: 160px;
      height: 120px;
      border-radius: 20px;
      background: linear-gradient(180deg, #fdfdfd 0%, #f2f2f2 100%);
      border: 3px solid #dddddd;
      display: grid;
      place-items: center;
      font-size: 2.8rem;
    }

    .bottle-scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .student-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .student-head {
      width: 86px;
      height: 86px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 2.05rem;
      border: 3px solid #e2c089;
      background: radial-gradient(circle at 32% 25%, #ffe6b8 0%, #ffd397 60%, #efbd78 100%);
    }

    .student-body {
      width: 92px;
      height: 74px;
      border-radius: 18px;
      background: linear-gradient(180deg, #6ca8ff 0%, #4c7ce0 100%);
      position: relative;
    }

    .student-body::before,
    .student-body::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 52px;
      background: #6ca8ff;
      top: 14px;
      border-radius: 999px;
    }

    .student-body::before { left: -10px; transform: rotate(18deg); }
    .student-body::after { right: -10px; transform: rotate(-18deg); }

    .bottle {
      width: 74px;
      height: 132px;
      border-radius: 16px 16px 20px 20px;
      border: 3px solid #67b9ff;
      background: linear-gradient(180deg, #f8fdff 0%, #eef8ff 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .bottle::before {
      content: "";
      position: absolute;
      top: -18px;
      width: 34px;
      height: 24px;
      border-radius: 12px 12px 6px 6px;
      background: linear-gradient(180deg, #8fd0ff 0%, #65b9ff 100%);
      border: 3px solid #67b9ff;
    }

    .water-fill {
      width: 100%;
      background: linear-gradient(180deg, #7fcfff 0%, #46b2ff 100%);
      transition: height 0.2s ease;
    }

    .borrower-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 6px;
    }

    .fail-box {
      min-height: 176px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--bad);
      font-weight: 900;
      line-height: 1.45;
      background: #fff4f4;
      border: 2px dashed #efc1c1;
      border-radius: 16px;
      padding: 12px;
    }

    details.help {
      margin-top: 18px;
      border: 2px solid #d8e4f6;
      border-radius: 16px;
      overflow: hidden;
      background: #fbfdff;
    }

    details.help summary {
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 800;
      user-select: none;
      list-style: none;
    }

    details.help summary::-webkit-details-marker {
      display: none;
    }

    .help-body {
      padding: 0 16px 16px;
      border-top: 2px solid #e5edf9;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.98rem;
    }

    .help-body p { margin: 12px 0 0; }

    .complete-list {
      margin: 18px auto 0;
      max-width: 760px;
      text-align: left;
      border: 2px solid #d8e4f6;
      border-radius: 18px;
      background: #fbfdff;
      padding: 16px 18px;
    }

    .complete-list h2 {
      margin: 0 0 10px;
      font-size: 1.15rem;
    }

    .complete-list ul {
      margin: 0;
      padding-left: 20px;
      line-height: 1.7;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    @media (max-width: 920px) {
      .main-layout {
        grid-template-columns: 1fr;
      }
      .side-card {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .app-shell {
        padding: 14px 10px 22px;
      }
      .hero, .screen-card, .side-card {
        padding: 18px;
      }
      .sentence-panel {
        font-size: 1.15rem;
        line-height: 1.75;
      }
      .guess-chip {
        min-width: 130px;
      }
      .guess-input {
        width: min(160px, 52vw);
      }
      .controls {
        align-items: stretch;
      }
      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="app" class="app" aria-live="polite"></div>
  </div>

  <script>
    const GAME_TITLE = "Roots Guess-the-Word Game";
    const SOURCE_SCREENS = [{"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Some roots hold the plant firmly to the ground.", "targets": ["roots"], "demeritText": "The carrot slowly gets more and more uprooted from the ground.", "failText": "A bunny eats the carrot.", "theme": "carrot_uprooted"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Some roots hold the plant firmly to the ground.", "targets": ["hold"], "demeritText": "The carrot slowly gets more and more uprooted from the ground.", "failText": "A bunny eats the carrot.", "theme": "carrot_uprooted"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Some roots hold the plant firmly to the ground.", "targets": ["firmly"], "demeritText": "The carrot slowly gets more and more uprooted from the ground.", "failText": "A bunny eats the carrot.", "theme": "carrot_uprooted"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Some roots hold the plant firmly to the ground.", "targets": ["ground"], "demeritText": "The carrot slowly gets more and more uprooted from the ground.", "failText": "A bunny eats the carrot.", "theme": "carrot_uprooted"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Roots help the plant to absorb water and mineral salts.", "targets": ["Roots"], "demeritText": "Someone borrows your bottle and starts drinking water from it. The more times it is wrong, the more water is drunk from it and the more upset you get.", "failText": "You have no more water and cry.", "theme": "thirsty_student"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Roots help the plant to absorb water and mineral salts.", "targets": ["absorb"], "demeritText": "Someone borrows your bottle and starts drinking water from it. The more times it is wrong, the more water is drunk from it and the more upset you get.", "failText": "You have no more water and cry.", "theme": "thirsty_student"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Roots help the plant to absorb water and mineral salts.", "targets": ["water"], "demeritText": "Someone borrows your bottle and starts drinking water from it. The more times it is wrong, the more water is drunk from it and the more upset you get.", "failText": "You have no more water and cry.", "theme": "thirsty_student"}, {"label": "Sentence", "prompt": "Type the missing science word.", "sentence": "Roots help the plant to absorb water and mineral salts.", "targets": ["mineral", "salts"], "demeritText": "Someone borrows your bottle and starts drinking water from it. The more times it is wrong, the more water is drunk from it and the more upset you get.", "failText": "You have no more water and cry.", "theme": "thirsty_student"}];
    const FLASH_DURATION_MS = 10000;

    const state = {
      view: "intro",
      screenIndex: 0,
      screens: [],
      currentInput: "",
      feedback: "",
      feedbackTone: "warn"
    };

    function normalizeWord(text) {
      return (text || "").toLowerCase().replace(/[^a-z0-9]/gi, "");
    }

    function tokenize(sentence) {
      return sentence.match(/(\s+|[A-Za-z']+|[^A-Za-z'\s]+)/g) || [];
    }

    function shuffleArray(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function prepareScreens(rawScreens) {
      return rawScreens.map((screen, idx) => {
        const tokens = tokenize(screen.sentence);
        const targetSet = new Set(screen.targets.map(t => normalizeWord(t)));
        const occurrences = [];

        tokens.forEach((token, tokenIndex) => {
          const normalized = normalizeWord(token);
          if (normalized && targetSet.has(normalized)) {
            occurrences.push({
              tokenIndex,
              originalToken: token,
              target: token,
              solved: false,
              fail: false,
              wrongAttempts: 0,
              revealedCount: 1,
              chanceLimit: Math.max(normalized.length - 2, 1)
            });
          }
        });

        return {
          ...screen,
          tokens,
          occurrences,
          orderLabel: idx + 1
        };
      });
    }

    function activeOccurrenceIndex(screen) {
      return screen.occurrences.findIndex(o => !o.solved);
    }

    function getActiveOccurrence(screen) {
      const index = activeOccurrenceIndex(screen);
      if (index === -1) return null;
      return { index, occurrence: screen.occurrences[index] };
    }

    function clueText(target, revealedCount) {
      const clean = target.replace(/[^A-Za-z0-9]/g, "");
      const shown = clean.slice(0, Math.max(1, revealedCount));
      const hidden = clean.slice(Math.max(1, revealedCount)).split("").map(() => "_").join(" ");
      return hidden ? `${shown} ${hidden}` : shown;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(text) {
      return escapeHtml(text).replace(/`/g, "&#96;");
    }

    function clearSpeech() {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    }

    function speakText(text) {
      if (!("speechSynthesis" in window)) return;
      clearSpeech();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.96;
      utterance.pitch = 1;
      window.speechSynthesis.speak(utterance);
    }

    function currentScreen() {
      return state.screens[state.screenIndex];
    }

    function screenSolved(screen) {
      return screen.occurrences.every(o => o.solved);
    }

    function sentenceForReadAloud(screen) {
      return screen.tokens.map((token, tokenIndex) => {
        const occIndex = screen.occurrences.findIndex(o => o.tokenIndex === tokenIndex);
        if (occIndex === -1) return token;
        const occ = screen.occurrences[occIndex];
        if (occ.solved || occ.fail) return occ.originalToken;
        return "blank";
      }).join("");
    }

    function updateFeedback(text, tone) {
      state.feedback = text;
      state.feedbackTone = tone;
    }

    function startGame() {
      const shuffled = shuffleArray(SOURCE_SCREENS);
      state.screens = prepareScreens(shuffled);
      state.view = "play";
      state.screenIndex = 0;
      state.currentInput = "";
      updateFeedback("Type the full missing word and tap Check.", "warn");
      render();
      focusActiveInput();
    }

    function restartAll() {
      clearSpeech();
      startGame();
    }

    function backToStart() {
      clearSpeech();
      state.view = "intro";
      state.screenIndex = 0;
      state.screens = [];
      state.currentInput = "";
      state.feedback = "";
      state.feedbackTone = "warn";
      render();
    }

    function focusActiveInput() {
      requestAnimationFrame(() => {
        const input = document.getElementById("activeGuessInput");
        if (input && !input.disabled) {
          input.focus();
          input.select();
        }
      });
    }

    function moveNext() {
      if (state.screenIndex < state.screens.length - 1) {
        state.screenIndex += 1;
        state.currentInput = "";
        updateFeedback("Type the full missing word and tap Check.", "warn");
        render();
        focusActiveInput();
      } else {
        state.view = "complete";
        render();
      }
    }

    function handleInputChange(value) {
      state.currentInput = value.replace(/\s+/g, "");
    }

    function resetFailedOccurrence(screen, occ) {
      occ.fail = false;
      occ.wrongAttempts = 0;
      occ.revealedCount = 1;
      state.currentInput = "";
      updateFeedback("That word has reset. Try again from the first clue.", "warn");
      render();
      focusActiveInput();
    }

    function checkGuess() {
      const screen = currentScreen();
      if (!screen) return;
      const active = getActiveOccurrence(screen);
      if (!active) return;

      const occ = active.occurrence;
      if (occ.fail) return;

      const guess = state.currentInput.trim();
      if (!guess) {
        updateFeedback("Type the full word first.", "warn");
        render();
        focusActiveInput();
        return;
      }

      if (normalizeWord(guess) === normalizeWord(occ.target)) {
        occ.solved = true;
        occ.fail = false;
        state.currentInput = "";
        updateFeedback(screenSolved(screen) ? "Correct. This sentence is complete." : "Correct. Now solve the next missing word.", "good");
        render();
        focusActiveInput();
        return;
      }

      occ.wrongAttempts += 1;
      occ.revealedCount = Math.min(normalizeWord(occ.target).length, occ.revealedCount + 1);

      if (occ.wrongAttempts >= occ.chanceLimit) {
        occ.fail = true;
        updateFeedback(screen.failText, "bad");
        render();
        window.setTimeout(() => {
          resetFailedOccurrence(screen, occ);
        }, FLASH_DURATION_MS);
        return;
      }

      updateFeedback(screen.demeritText + " One more letter is now shown.", "warn");
      render();
      focusActiveInput();
    }

    function buildSentenceMarkup(screen) {
      const active = getActiveOccurrence(screen);
      const activeIndex = active ? active.index : -1;

      return screen.tokens.map((token, tokenIndex) => {
        const occIndex = screen.occurrences.findIndex(o => o.tokenIndex === tokenIndex);
        if (occIndex === -1) {
          return `<span class="plain-token">${escapeHtml(token)}</span>`;
        }

        const occ = screen.occurrences[occIndex];

        if (occ.solved) {
          return `<span class="guess-wrap"><span class="guess-chip solved"><span class="solved-word">${escapeHtml(occ.originalToken)}</span></span></span>`;
        }

        if (occ.fail) {
          return `<span class="guess-wrap"><span class="guess-chip fail"><span class="flash-word">${escapeHtml(occ.originalToken)}</span></span></span>`;
        }

        if (occIndex === activeIndex) {
          const width = Math.max(120, normalizeWord(occ.target).length * 18 + 80);
          return `
            <span class="guess-wrap">
              <label class="guess-chip" aria-label="Missing word input">
                <span class="clue">${escapeHtml(clueText(occ.target, occ.revealedCount))}</span>
                <input
                  id="activeGuessInput"
                  class="guess-input"
                  type="text"
                  autocomplete="off"
                  autocapitalize="none"
                  spellcheck="false"
                  inputmode="text"
                  maxlength="${normalizeWord(occ.target).length + 2}"
                  placeholder="Type full word"
                  style="width:${width}px"
                  value="${escapeAttribute(state.currentInput)}"
                />
              </label>
            </span>
          `;
        }

        return `<span class="guess-wrap"><span class="guess-chip future"><span class="clue">${escapeHtml(clueText(occ.target, 1))}</span></span></span>`;
      }).join("");
    }

    function faceState(theme, used, total, fail) {
      if (fail) {
        if (theme === "carrot_uprooted") return { cls: "fail", emoji: "🐰", caption: "The bunny got the carrot." };
        return { cls: "fail", emoji: "😭", caption: "There is no water left." };
      }
      if (used === 0) {
        if (theme === "carrot_uprooted") return { cls: "", emoji: "😄", caption: "The carrot is still safe in the ground." };
        return { cls: "", emoji: "🙂", caption: "The bottle is still full." };
      }
      const ratio = used / total;
      if (ratio < 0.5) {
        if (theme === "carrot_uprooted") return { cls: "worried", emoji: "😟", caption: "The carrot is being pulled upward." };
        return { cls: "worried", emoji: "😟", caption: "Your bottle is getting emptier." };
      }
      if (theme === "carrot_uprooted") return { cls: "angry", emoji: "😣", caption: "The carrot is almost uprooted." };
      return { cls: "angry", emoji: "😢", caption: "You are almost out of water." };
    }

    function renderCarrotTheme(used, total, fail, screen) {
      const face = faceState("carrot_uprooted", used, total, fail);
      const left = Math.max(total - used, 0);

      if (fail) {
        return `
          <div class="tracker-frame">
            <div class="fail-box">
              <div class="tracker-top">
                <div class="face-bubble fail">🐰</div>
                <div class="face-caption">${escapeHtml(face.caption)}</div>
              </div>
              <div class="bunny-eats">🐰🥕</div>
              <div style="margin-top:8px;">${escapeHtml(screen.failText)}</div>
            </div>
          </div>
        `;
      }

      const rootChips = Array.from({ length: total }, (_, i) => `<span class="tracker-chip ${i < used ? "lost" : ""}">${i < used ? "⬆️" : "🌱"}</span>`).join("");
      const rise = Math.min(used * 18, 62);

      return `
        <div class="tracker-frame">
          <div class="tracker-row">${rootChips}</div>
          <div class="scene">
            <div class="carrot-scene">
              <div class="tracker-top">
                <div class="face-bubble ${face.cls}">${face.emoji}</div>
                <div class="face-caption">${face.caption}</div>
              </div>
              <div class="carrot-stack" style="transform: translateY(-${rise}px);">
                <div class="carrot-face">${face.emoji}</div>
                <div class="carrot-body"><div class="carrot-top">🌿🌿</div></div>
              </div>
              <div class="ground-strip">ground</div>
            </div>
          </div>
          <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Firm roots left: ${left}</span></div>
        </div>
      `;
    }

    function renderBottleTheme(used, total, fail, screen) {
      const face = faceState("thirsty_student", used, total, fail);
      const left = Math.max(total - used, 0);

      if (fail) {
        return `
          <div class="tracker-frame">
            <div class="fail-box">
              <div class="tracker-top">
                <div class="face-bubble fail">😭</div>
                <div class="face-caption">${escapeHtml(face.caption)}</div>
              </div>
              <div class="bottle-scene">
                <div class="student-wrap">
                  <div class="student-head">😭</div>
                  <div class="student-body"></div>
                </div>
                <div class="bottle"><div class="water-fill" style="height: 0%;"></div></div>
              </div>
              <div style="margin-top:8px;">${escapeHtml(screen.failText)}</div>
            </div>
          </div>
        `;
      }

      const borrowIcons = Array.from({ length: total }, (_, i) => `<span class="tracker-chip ${i < used ? "lost" : ""}">${i < used ? "🥤" : "💧"}</span>`).join("");
      const fillPct = Math.max(12, 100 - (used / total) * 88);

      return `
        <div class="tracker-frame">
          <div class="borrower-row">${borrowIcons}</div>
          <div class="scene">
            <div class="bottle-scene">
              <div class="tracker-top">
                <div class="face-bubble ${face.cls}">${face.emoji}</div>
                <div class="face-caption">${face.caption}</div>
              </div>
              <div class="student-wrap">
                <div class="student-head">${face.emoji}</div>
                <div class="student-body"></div>
              </div>
              <div class="bottle">
                <div class="water-fill" style="height: ${fillPct}%;"></div>
              </div>
            </div>
          </div>
          <div class="tracker-stats"><span>Wrong tries: ${used} / ${total}</span><span>Water level left: ${left}</span></div>
        </div>
      `;
    }

    function trackerMarkup(screen) {
      const active = getActiveOccurrence(screen);
      if (!active) {
        return `
          <div class="tracker-frame">
            <div class="scene">
              <div class="tracker-top">
                <div class="face-bubble">😄</div>
                <div class="face-caption">This screen is complete.</div>
              </div>
            </div>
          </div>
        `;
      }

      const occ = active.occurrence;
      if (screen.theme === "carrot_uprooted") {
        return renderCarrotTheme(occ.wrongAttempts, occ.chanceLimit, occ.fail, screen);
      }
      return renderBottleTheme(occ.wrongAttempts, occ.chanceLimit, occ.fail, screen);
    }

    function renderIntro() {
      return `
        <section class="card hero">
          <div class="badge">🌱 Guess the missing science word</div>
          <h1>${escapeHtml(GAME_TITLE)}</h1>
          <p>
            Each time you start, the screens appear in a random order.
            Type the full missing word inside the sentence and watch the penalty tracker change expression as wrong tries build up.
          </p>
          <button class="button primary" id="startBtn">Start game</button>
        </section>
      `;
    }

    function renderPlay() {
      const screen = currentScreen();
      const active = getActiveOccurrence(screen);
      const complete = screenSolved(screen);

      return `
        <div class="main-layout">
          <section class="card screen-card">
            <div class="top-row">
              <div class="label-pill">${escapeHtml(screen.label)}</div>
              <div class="progress">Screen ${state.screenIndex + 1} of ${state.screens.length}</div>
            </div>

            <p class="prompt">${escapeHtml(screen.prompt)}</p>

            <div class="sentence-panel">${buildSentenceMarkup(screen)}</div>

            <div class="controls">
              <button class="button primary" id="checkBtn" ${active && active.occurrence.fail ? "disabled" : ""}>Check</button>
              <button class="button secondary" id="readBtn">🔊 Read aloud</button>
              <button class="button ghost" id="nextBtn" ${complete ? "" : "disabled"}>Next screen</button>
            </div>

            <div class="feedback ${state.feedbackTone}">${escapeHtml(state.feedback)}</div>

            <details class="help">
              <summary>How to play</summary>
              <div class="help-body">
                <p>Type the full missing word.</p>
                <p>The first letter is shown first. A wrong non-blank answer reveals one more letter.</p>
                <p>If all chances for the current word are used up, only that word flashes, then only that word resets.</p>
                <p>Restarting the game randomizes the screen order again.</p>
              </div>
            </details>
          </section>

          <aside class="card side-card">
            <h2>Penalty tracker</h2>
            <p class="mini">${escapeHtml(screen.demeritText)}</p>
            ${trackerMarkup(screen)}
            <p class="mini" style="margin-top:12px;">The tracker resets for the next word.</p>
          </aside>
        </div>
      `;
    }

    function renderComplete() {
      const items = state.screens.map((s, i) => `<li>Screen ${i + 1}: ${escapeHtml(s.sentence)}</li>`).join("");
      return `
        <section class="card hero">
          <div class="badge">✅ Game complete</div>
          <h1>${escapeHtml(GAME_TITLE)}</h1>
          <p>You completed all the sentence screens in a randomized order.</p>
          <div class="complete-list">
            <h2>Completed screens</h2>
            <ul>${items}</ul>
          </div>
          <div class="controls" style="justify-content:center; margin-top:20px;">
            <button class="button primary" id="restartBtn">Restart all</button>
            <button class="button secondary" id="homeBtn">Return to start</button>
          </div>
        </section>
      `;
    }

    function render() {
      const app = document.getElementById("app");
      if (!app) return;
      if (state.view === "intro") app.innerHTML = renderIntro();
      else if (state.view === "play") app.innerHTML = renderPlay();
      else app.innerHTML = renderComplete();
      bindEvents();
    }

    function bindEvents() {
      const startBtn = document.getElementById("startBtn");
      if (startBtn) startBtn.addEventListener("click", startGame);

      const restartBtn = document.getElementById("restartBtn");
      if (restartBtn) restartBtn.addEventListener("click", restartAll);

      const homeBtn = document.getElementById("homeBtn");
      if (homeBtn) homeBtn.addEventListener("click", backToStart);

      const checkBtn = document.getElementById("checkBtn");
      if (checkBtn) checkBtn.addEventListener("click", checkGuess);

      const nextBtn = document.getElementById("nextBtn");
      if (nextBtn) nextBtn.addEventListener("click", moveNext);

      const readBtn = document.getElementById("readBtn");
      if (readBtn) {
        readBtn.addEventListener("click", () => {
          if (state.view === "play") {
            const screen = currentScreen();
            speakText([GAME_TITLE, screen.label, screen.prompt, sentenceForReadAloud(screen), state.feedback].filter(Boolean).join(". "));
          } else if (state.view === "intro") {
            speakText(`${GAME_TITLE}. Read each sentence and type the missing science word.`);
          } else {
            speakText(`${GAME_TITLE}. You completed all screens.`);
          }
        });
      }

      const input = document.getElementById("activeGuessInput");
      if (input) {
        input.addEventListener("input", (e) => {
          handleInputChange(e.target.value);
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            checkGuess();
          }
        });
      }
    }

    render();
  </script>
</body>
</html>
